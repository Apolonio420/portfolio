<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas Técnicas de Platillos</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  .star-filled { color: #4f46e5; }
  .star-empty { color: #d1d5db; }
  .allergen-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  @media print {
    .no-print { display: none !important; }
    body { background: white !important; }
    .print-card { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
    .print-break { page-break-after: always; }
    #main-grid { display: none !important; }
    #dish-detail { display: block !important; position: static !important; }
  }
  .gradient-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
  .card-hover { transition: all 0.2s ease; }
  .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,70,229,0.15); }
  .difficulty-star { font-size: 14px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  input, select, textarea { outline: none; }
  input:focus, select:focus, textarea:focus { ring: 2px solid #4f46e5; }
  .cost-bar { height: 6px; border-radius: 3px; background: #e5e7eb; }
  .cost-fill { height: 100%; border-radius: 3px; }
  #dish-detail { display: none; }
  #dish-detail.active { display: block; }
  .step-num { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; background: #4f46e5; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.hidden { display: none; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="gradient-header text-white shadow-lg no-print">
  <div class="max-w-7xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-800 tracking-tight">Fichas Técnicas de Platillos</h1>
        <p class="text-indigo-200 text-sm mt-0.5">Blueprint de cocina · Control de calidad y costo</p>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="openAddModal()" class="bg-white text-indigo-700 font-600 px-4 py-2 rounded-xl text-sm hover:bg-indigo-50 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Nuevo Platillo
        </button>
        <button onclick="printBooklet()" class="bg-indigo-800 text-white font-600 px-4 py-2 rounded-xl text-sm hover:bg-indigo-900 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
          Imprimir Todo
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Filter Bar -->
<div class="max-w-7xl mx-auto px-4 py-4 no-print">
  <div class="flex gap-3 flex-wrap items-center">
    <div class="flex-1 min-w-48 relative">
      <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="search-input" type="text" placeholder="Buscar platillo..." oninput="renderGrid()" class="pl-9 pr-4 py-2 rounded-xl border border-gray-200 bg-white text-sm w-full focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100">
    </div>
    <select id="cat-filter" onchange="renderGrid()" class="px-4 py-2 rounded-xl border border-gray-200 bg-white text-sm focus:border-indigo-400">
      <option value="">Todas las categorías</option>
      <option>Entradas</option>
      <option>Principales</option>
      <option>Postres</option>
      <option>Bebidas</option>
      <option>Guarniciones</option>
    </select>
    <div id="stats-bar" class="text-sm text-gray-500 font-500"></div>
  </div>
</div>

<!-- Main Grid -->
<main id="main-grid" class="max-w-7xl mx-auto px-4 pb-12">
  <div id="dishes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
</main>

<!-- Dish Detail View -->
<div id="dish-detail" class="max-w-5xl mx-auto px-4 pb-12">
  <div id="detail-content" class="print-card bg-white rounded-2xl shadow-sm border border-gray-100"></div>
</div>

<!-- Add/Edit Modal -->
<div id="add-modal" class="modal-overlay hidden no-print">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-screen overflow-y-auto">
    <div class="gradient-header text-white p-5 rounded-t-2xl flex justify-between items-center">
      <h2 id="modal-title" class="text-lg font-700">Nuevo Platillo</h2>
      <button onclick="closeModal()" class="hover:opacity-70">✕</button>
    </div>
    <form id="dish-form" class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block text-sm font-600 text-gray-700 mb-1">Nombre del Platillo *</label>
          <input id="f-name" type="text" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="Chiles en Nogada" required>
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 mb-1">Categoría</label>
          <select id="f-cat" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
            <option>Entradas</option><option>Principales</option><option>Postres</option><option>Bebidas</option><option>Guarniciones</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 mb-1">Dificultad (1-5)</label>
          <input id="f-difficulty" type="number" min="1" max="5" value="3" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 mb-1">Tiempo Prep (min)</label>
          <input id="f-prep" type="number" value="20" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 mb-1">Tiempo Cocción (min)</label>
          <input id="f-cook" type="number" value="30" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 mb-1">Porciones por Tanda</label>
          <input id="f-yield" type="number" value="4" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 mb-1">Precio Venta (MXN)</label>
          <input id="f-price" type="number" value="180" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
        </div>
      </div>
      <div>
        <label class="block text-sm font-600 text-gray-700 mb-1">Ingredientes (uno por línea: Nombre, gramos, costo_por_kg)</label>
        <textarea id="f-ingredients" rows="6" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm font-mono text-xs" placeholder="Pollo, 200, 120&#10;Chile poblano, 150, 80&#10;Queso, 50, 200"></textarea>
      </div>
      <div>
        <label class="block text-sm font-600 text-gray-700 mb-1">Preparación (un paso por línea)</label>
        <textarea id="f-steps" rows="5" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="Lavar y desvenar los chiles&#10;Preparar el relleno..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-600 text-gray-700 mb-1">Emplatado (descripción de presentación)</label>
        <textarea id="f-plating" rows="2" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="Colocar chile en plato blanco ovalado..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-600 text-gray-700 mb-2">Alérgenos</label>
        <div class="flex flex-wrap gap-2">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="a-gluten" class="rounded"> Gluten</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="a-dairy" class="rounded"> Lácteos</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="a-nuts" class="rounded"> Nueces</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="a-seafood" class="rounded"> Mariscos</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="a-egg" class="rounded"> Huevo</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="a-soy" class="rounded"> Soya</label>
        </div>
      </div>
      <div>
        <label class="block text-sm font-600 text-gray-700 mb-1">Notas</label>
        <textarea id="f-notes" rows="2" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="Notas especiales, variaciones, tips..."></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 bg-indigo-600 text-white font-600 py-2.5 rounded-xl hover:bg-indigo-700 transition">Guardar</button>
        <button type="button" onclick="closeModal()" class="px-6 border border-gray-200 rounded-xl text-sm font-600 hover:bg-gray-50 transition">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<!-- Footer -->
<footer class="bg-white border-t border-gray-100 py-4 text-center text-xs text-gray-400 no-print mt-8">
  Powered by <span class="font-700 text-indigo-600">Novamente Studio</span> &copy; <span id="footer-year"></span>
</footer>

let dishes = [];
let editingId = null;

function loadData() {
  const stored = localStorage.getItem('fichas_tecnicas_v1');
  if (stored) {
    dishes = JSON.parse(stored);
  } else {
    dishes = DEMO_DISHES;
    saveData();
  }
}

function saveData() {
  localStorage.setItem('fichas_tecnicas_v1', JSON.stringify(dishes));
}

function calcIngredientCost(ingredients) {
  return ingredients.reduce((sum, ing) => sum + (ing.grams * ing.costPerKg / 1000), 0);
}

function foodCostPct(dish) {
  const cost = calcIngredientCost(dish.ingredients) / dish.yield;
  return Math.round((cost / dish.price) * 100);
}

function stars(n, max = 5) {
  let s = '';
  for (let i = 1; i <= max; i++) {
    s += `<span class="${i <= n ? 'star-filled' : 'star-empty'} difficulty-star">★</span>`;
  }
  return s;
}

function categoryColor(cat) {
  const colors = {
    'Entradas': 'bg-amber-100 text-amber-800',
    'Principales': 'bg-indigo-100 text-indigo-800',
    'Postres': 'bg-pink-100 text-pink-800',
    'Bebidas': 'bg-sky-100 text-sky-800',
    'Guarniciones': 'bg-green-100 text-green-800',
  };
  return colors[cat] || 'bg-gray-100 text-gray-700';
}

function fcColor(pct) {
  if (pct <= 30) return 'bg-green-500';
  if (pct <= 40) return 'bg-amber-500';
  return 'bg-red-500';
}

function renderGrid() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  let filtered = dishes.filter(d => {
    const matchSearch = d.name.toLowerCase().includes(search);
    const matchCat = !cat || d.category === cat;
    return matchSearch && matchCat;
  });

  document.getElementById('stats-bar').textContent = `${filtered.length} platillo${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('dishes-grid');
  grid.innerHTML = filtered.map(d => {
    const fc = foodCostPct(d);
    const costPorcion = calcIngredientCost(d.ingredients) / d.yield;
    return `
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm card-hover cursor-pointer overflow-hidden" onclick="showDetail(${d.id})">
      <div class="gradient-header p-4">

          <span class="tag ${categoryColor(d.category)}">${d.category}</span>
          <div class="flex gap-1 no-print">

              <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button onclick="event.stopPropagation(); deleteDish(${d.id})" class="p-1.5 bg-white/20 hover:bg-white/30 rounded-lg transition" title="Eliminar">
              <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

      <div class="p-4">
        <div class="flex justify-between items-center text-sm mb-3">
          <span class="text-gray-500">⏱ ${d.prepTime + d.cookTime} min total</span>

        <div class="mb-1 flex justify-between text-xs">

        <div class="mt-2 text-xs text-gray-400">Costo/porción: $${costPorcion.toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');
}

        ${activeAllergens.length > 0 ? `<div class="mt-3 flex flex-wrap gap-2">

              ${allergenList.map(a => `<span class="allergen-badge ${d.allergens[a.key] ? a.color : 'bg-gray-100 text-gray-400 line-through'}">${a.label}</span>`).join('')}

function backToGrid() {
  document.getElementById('main-grid').style.display = '';
  document.getElementById('dish-detail').classList.remove('active');
  renderGrid();
}

function printDetail() {
  document.getElementById('main-grid').style.display = 'none';
  window.print();
  document.getElementById('main-grid').style.display = '';
}

function printBooklet() {
  alert('Imprimiendo recetario completo...\nSe abrirá el diálogo de impresión. Selecciona "Guardar como PDF" para exportar el libro de fichas.');
  window.print();
}

function openAddModal(id = null) {
  editingId = id;
  const d = id ? dishes.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = d ? 'Editar Platillo' : 'Nuevo Platillo';
  document.getElementById('f-name').value = d ? d.name : '';
  document.getElementById('f-cat').value = d ? d.category : 'Principales';
  document.getElementById('f-difficulty').value = d ? d.difficulty : 3;
  document.getElementById('f-prep').value = d ? d.prepTime : 20;
  document.getElementById('f-cook').value = d ? d.cookTime : 30;
  document.getElementById('f-yield').value = d ? d.yield : 4;
  document.getElementById('f-price').value = d ? d.price : 180;
  document.getElementById('f-ingredients').value = d ? d.ingredients.map(i => `${i.name}, ${i.grams}, ${i.costPerKg}`).join('\n') : '';
  document.getElementById('f-steps').value = d ? d.steps.join('\n') : '';
  document.getElementById('f-plating').value = d ? d.plating : '';
  document.getElementById('f-notes').value = d ? d.notes : '';
  document.getElementById('a-gluten').checked = d ? d.allergens.gluten : false;
  document.getElementById('a-dairy').checked = d ? d.allergens.dairy : false;
  document.getElementById('a-nuts').checked = d ? d.allergens.nuts : false;
  document.getElementById('a-seafood').checked = d ? d.allergens.seafood : false;
  document.getElementById('a-egg').checked = d ? d.allergens.egg : false;
  document.getElementById('a-soy').checked = d ? d.allergens.soy : false;
  document.getElementById('add-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('add-modal').classList.add('hidden');
  editingId = null;
}

function editDish(id) {
  backToGrid();
  openAddModal(id);
}

function deleteDish(id) {
  if (!confirm('¿Eliminar este platillo?')) return;
  dishes = dishes.filter(d => d.id !== id);
  saveData();
  renderGrid();
}

document.getElementById('dish-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const ingredients = document.getElementById('f-ingredients').value.split('\n')
    .map(line => line.trim()).filter(Boolean)
    .map(line => {
      const parts = line.split(',').map(s => s.trim());
      return { name: parts[0] || '', grams: parseFloat(parts[1]) || 0, costPerKg: parseFloat(parts[2]) || 0 };
    });
  const steps = document.getElementById('f-steps').value.split('\n').map(s => s.trim()).filter(Boolean);

  const dish = {
    id: editingId || Date.now(),
    name: document.getElementById('f-name').value,
    category: document.getElementById('f-cat').value,
    difficulty: parseInt(document.getElementById('f-difficulty').value),
    prepTime: parseInt(document.getElementById('f-prep').value),
    cookTime: parseInt(document.getElementById('f-cook').value),
    yield: parseInt(document.getElementById('f-yield').value),
    price: parseFloat(document.getElementById('f-price').value),
    ingredients,
    steps,
    plating: document.getElementById('f-plating').value,
    notes: document.getElementById('f-notes').value,
    allergens: {
      gluten: document.getElementById('a-gluten').checked,
      dairy: document.getElementById('a-dairy').checked,
      nuts: document.getElementById('a-nuts').checked,
      seafood: document.getElementById('a-seafood').checked,
      egg: document.getElementById('a-egg').checked,
      soy: document.getElementById('a-soy').checked,
    }
  };

  if (editingId) {
    dishes = dishes.map(d => d.id === editingId ? dish : d);
  } else {
    dishes.push(dish);
  }
  saveData();
  closeModal();
  renderGrid();
});

loadData();
renderGrid();
</script>
