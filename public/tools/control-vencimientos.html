  .status-proximo { background:#fef9c3; color:#854d0e; border-left:4px solid #eab308; }

  .badge-proximo { background:#fef9c3; color:#854d0e; }
  .badge-urgente { background:#fee2e2; color:#991b1b; }

  .dot-proximo { background:#eab308; }

  .dot-vencido { background:#9ca3af; }

<body class="bg-gray-50 min-h-screen">

}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// Compute days to expiry from today
function today(){ return new Date().toISOString().split('T')[0]; }
function daysToExpiry(dateStr){
  const now = new Date(); now.setHours(0,0,0,0);
  const exp = new Date(dateStr); exp.setHours(0,0,0,0);
  return Math.round((exp - now) / 86400000);
}
function getStatus(dateStr){
  const d = daysToExpiry(dateStr);
  if(d < 0) return 'Vencido';
  if(d < 2) return 'Urgente';
  if(d < 5) return 'Próximo';
  return 'OK';
}

// Utils
function getProd(id){ return data.productos.find(p => p.id === id) || {}; }
function activeLotes(){ return data.lotes.filter(l => l.status === 'activo'); }

function getStatusClass(status){
  return {OK:'status-ok', Próximo:'status-proximo', Urgente:'status-urgente', Vencido:'status-vencido'}[status] || 'status-ok';
}
function getBadgeClass(status){
  return {OK:'badge-ok', Próximo:'badge-proximo', Urgente:'badge-urgente', Vencido:'badge-vencido'}[status] || 'badge-ok';
}
function getDotClass(status){
  return {OK:'dot-ok', Próximo:'dot-proximo', Urgente:'dot-urgente', Vencido:'dot-vencido'}[status] || 'dot-ok';
}
function getStatusIcon(status){
  return {OK:'🟢', Próximo:'🟡', Urgente:'🔴', Vencido:'⚫'}[status] || '🟢';
}

function setTab(tab){
  ['dashboard','inventario','alertas','estadisticas'].forEach(t => {
    document.getElementById('view-'+t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-'+t);
    btn.classList.toggle('tab-active', t === tab);
    btn.classList.toggle('tab-inactive', t !== tab);
  });
  if(tab === 'dashboard') renderDashboard();
  if(tab === 'inventario') renderInventario();
  if(tab === 'alertas') renderAlertas();
  if(tab === 'estadisticas') renderEstadisticas();
}

// Render Dashboard
function renderDashboard(){
  const lotes = activeLotes();
  const byStatus = {OK:0, Próximo:0, Urgente:0, Vencido:0};
  lotes.forEach(l => byStatus[getStatus(l.vencimiento)]++);

  document.getElementById('dashStats').innerHTML = [
    {label:'Total lotes activos', val: lotes.length, cls:'text-gray-800', icon:'📦'},
    {label:'OK (>5 días)', val: byStatus.OK, cls:'text-green-600', icon:'🟢'},
    {label:'Próximos (2-5 días)', val: byStatus.Próximo, cls:'text-yellow-600', icon:'🟡'},
    {label:'Urgentes/Vencidos', val: byStatus.Urgente + byStatus.Vencido, cls:'text-red-600 pulse', icon:'🔴'}
  ].map(s => `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <p class="text-xs text-gray-500 mb-1">${s.icon} ${s.label}</p>
      <p class="text-3xl font-bold ${s.cls}">${s.val}</p>
    </div>
  `).join('');

  // FIFO: products with multiple batches sorted by expiry
  const prodGroups = {};
  lotes.forEach(l => {
    const p = getProd(l.productoId);
    if(!prodGroups[l.productoId]) prodGroups[l.productoId] = {nombre:p.nombre, categoria:p.categoria, unidad:p.unidad, lotes:[]};
    prodGroups[l.productoId].lotes.push(l);
  });
  Object.values(prodGroups).forEach(pg => pg.lotes.sort((a,b) => new Date(a.vencimiento)-new Date(b.vencimiento)));

  // Show only products with URGENT/VENCIDO first, then Próximo
  const urgent = lotes.filter(l => ['Urgente','Vencido'].includes(getStatus(l.vencimiento))).sort((a,b) => new Date(a.vencimiento)-new Date(b.vencimiento));

  if(urgent.length > 0){
    document.getElementById('dashFIFO').innerHTML = `
      <h2 class="text-lg font-bold text-red-700 mb-3">🚨 Requieren acción inmediata (${urgent.length})</h2>
      <div class="space-y-2">${urgent.map(l => {
        const p = getProd(l.productoId);
        const st = getStatus(l.vencimiento);
        const days = daysToExpiry(l.vencimiento);
        const dayText = days < 0 ? `Vencido hace ${Math.abs(days)} día(s)` : days === 0 ? 'Vence HOY' : `Vence en ${days} día(s)`;
        return `<div class="${getStatusClass(st)} rounded-xl p-4 flex items-center justify-between gap-3 print-section">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-gray-800">${p.nombre}</span>
              <span class="fifo-badge">FIFO</span>
              <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${l.ubicacion}</span>
            </div>
            <p class="text-xs font-semibold mt-0.5">${dayText} · ${l.cantidad} ${p.unidad} · Lote: ${l.vencimiento}</p>
          </div>
          <div class="flex gap-1 flex-shrink-0">
            <button onclick="accionLote('${l.id}','usar')" class="bg-green-500 text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-green-600 transition">Usar</button>
            <button onclick="accionLote('${l.id}','descartar')" class="bg-gray-500 text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-gray-600 transition">Descartar</button>
          </div>
        </div>`;
      }).join('')}</div>
    `;
  } else {
    document.getElementById('dashFIFO').innerHTML = '<div class="bg-green-50 border border-green-200 rounded-2xl p-6 text-center"><p class="text-green-700 font-semibold">✅ No hay productos urgentes o vencidos</p></div>';
  }

  // Vencidos section
  const vencidos = lotes.filter(l => getStatus(l.vencimiento) === 'Vencido');
  document.getElementById('dashVencidos').innerHTML = vencidos.length === 0 ? '' : `
    <h2 class="text-lg font-bold text-gray-500 mb-3">⚫ Vencidos — Descartar</h2>
    <div class="space-y-2">${vencidos.map(l => {
      const p = getProd(l.productoId);
      const days = Math.abs(daysToExpiry(l.vencimiento));
      return `<div class="status-vencido rounded-xl p-4 flex items-center justify-between gap-3">
        <div>
          <p class="font-bold text-gray-700">${p.nombre}</p>
          <p class="text-xs text-gray-500">Venció hace ${days} día(s) · ${l.cantidad} ${p.unidad} · ${l.ubicacion}</p>

      </div>`;
    }).join('')}</div>
  `;
}

function renderInventario(){
  const q = (document.getElementById('buscarInv').value || '').toLowerCase();
  const cat = document.getElementById('filtroCat').value;
  const loc = document.getElementById('filtroLoc').value;
  const st = document.getElementById('filtroStatus').value;

  // Group lotes by product
  const prodGroups = {};
  data.productos.forEach(p => { prodGroups[p.id] = {...p, lotes:[]}; });
  activeLotes().forEach(l => {
    if(prodGroups[l.productoId]) prodGroups[l.productoId].lotes.push(l);
  });

  let grupos = Object.values(prodGroups).filter(pg => pg.lotes.length > 0);

  // Filter
  grupos = grupos.filter(pg => {
    if(q && !pg.nombre.toLowerCase().includes(q)) return false;
    if(cat && pg.categoria !== cat) return false;
    if(loc && !pg.lotes.some(l => l.ubicacion === loc)) return false;
    if(st) {
      const stMap = {OK:'OK', Próximo:'Próximo', Urgente:'Urgente', Vencido:'Vencido'};
      if(!pg.lotes.some(l => getStatus(l.vencimiento) === stMap[st])) return false;
    }
    return true;
  });

  // Sort: most urgent first
  const stOrder = {Vencido:0, Urgente:1, Próximo:2, OK:3};
  grupos.forEach(pg => pg.lotes.sort((a,b) => new Date(a.vencimiento)-new Date(b.vencimiento)));
  grupos.sort((a,b) => stOrder[getStatus(a.lotes[0].vencimiento)] - stOrder[getStatus(b.lotes[0].vencimiento)]);

  const catColors = {Lácteos:'bg-blue-100 text-blue-700',Carnes:'bg-red-100 text-red-700','Frutas/Verduras':'bg-green-100 text-green-700',Enlatados:'bg-yellow-100 text-yellow-700',Congelados:'bg-cyan-100 text-cyan-700',Salsas:'bg-orange-100 text-orange-700',Bebidas:'bg-purple-100 text-purple-700'};

  document.getElementById('listaInventario').innerHTML = grupos.length === 0
    ? '<div class="bg-white rounded-2xl border border-gray-100 p-12 text-center text-gray-400">No se encontraron productos</div>'
    : grupos.map(pg => {
      const totalCant = pg.lotes.reduce((s,l) => s+l.cantidad, 0);
      const worstStatus = getStatus(pg.lotes[0].vencimiento);
      return `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden print-section">
        <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-orange-50 transition" onclick="toggleLotes('lotes_${pg.id}')">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <div class="w-3 h-3 rounded-full flex-shrink-0 ${getDotClass(worstStatus)}"></div>
            <div class="min-w-0">
              <p class="font-bold text-gray-800">${pg.nombre}</p>
              <p class="text-xs text-gray-500">${pg.lotes.length} lote(s) · Total: ${totalCant} ${pg.unidad}</p>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="text-xs px-2 py-1 rounded-full ${catColors[pg.categoria]||'bg-gray-100 text-gray-700'}">${pg.categoria}</span>
            <span class="text-xs font-bold px-2 py-1 rounded-full ${getBadgeClass(worstStatus)}">${getStatusIcon(worstStatus)} ${worstStatus}</span>
            <span class="text-gray-400 text-sm">▾</span>
          </div>
        </div>
        <div id="lotes_${pg.id}" class="hidden border-t border-gray-100">
          ${pg.lotes.map((l, idx) => {
            const st = getStatus(l.vencimiento);
            const days = daysToExpiry(l.vencimiento);
            const dayText = days < 0 ? `Vencido hace ${Math.abs(days)}d` : days === 0 ? 'Vence HOY' : `${days} días`;
            return `<div class="flex items-center justify-between px-4 py-3 ${idx%2===0?'bg-white':'bg-gray-50'} ${getStatusClass(st)} border-l-0 ml-4 rounded-r-none">
              <div class="flex-1">
                ${idx === 0 ? '<span class="fifo-badge mr-2">USAR PRIMERO</span>' : ''}
                <span class="text-sm font-semibold">${l.cantidad} ${pg.unidad}</span>
                <span class="text-xs text-gray-500 ml-2">Vence: ${l.vencimiento} (${dayText})</span>
                <span class="text-xs text-gray-400 ml-2">📍 ${l.ubicacion}</span>

              <div class="flex gap-1">

    }).join('');

function accionLote(loteId, accion){
  const l = data.lotes.find(x => x.id === loteId);
  if(!l) return;
  const p = getProd(l.productoId);

  if(accion === 'usar'){
    const cant = parseFloat(prompt(`¿Cuánto ${p.unidad} de "${p.nombre}" se usó? (disponible: ${l.cantidad})`, l.cantidad));
    if(isNaN(cant) || cant <= 0) return;
    if(cant >= l.cantidad){
      l.status = 'usado';
      const d = daysToExpiry(l.vencimiento);
      // log avg days before use conceptually
    } else {
      l.cantidad -= cant;
    }
    saveData();
    refreshCurrentTab();
    return;
  }

  if(accion === 'descartar'){
    if(!confirm(`¿Descartar lote de "${p.nombre}" (${l.cantidad} ${p.unidad})? Esto se registrará como merma.`)) return;
    data.descartados.push({
      loteId: 'desc_' + Date.now(),
      productoNombre: p.nombre,
      cantidad: l.cantidad,
      unidad: p.unidad,
      precio: p.precio || 0,
      fecha: today(),
      razon: 'Vencido',
      categoria: p.categoria
    });
    l.status = 'descartado';
    saveData();
    refreshCurrentTab();
    return;
  }

  if(accion === 'mover'){
    const ubicaciones = ['Refrigerador 1','Refrigerador 2','Congelador','Alacena','Barra'];
    const nuevaUbic = prompt(`Mover "${p.nombre}" a:\n${ubicaciones.map((u,i) => `${i+1}. ${u}`).join('\n')}\n\nEscribe el número:`, '');
    const idx = parseInt(nuevaUbic) - 1;
    if(idx >= 0 && idx < ubicaciones.length){
      l.ubicacion = ubicaciones[idx];
      saveData();
      refreshCurrentTab();
    }
    return;
  }
}

function refreshCurrentTab(){
  const active = ['dashboard','inventario','alertas','estadisticas'].find(t => !document.getElementById('view-'+t).classList.contains('hidden'));
  if(active === 'dashboard') renderDashboard();
  if(active === 'inventario') renderInventario();
  if(active === 'alertas') renderAlertas();
  if(active === 'estadisticas') renderEstadisticas();
}

let chartEstInst = null, chartMermInst = null;
function renderEstadisticas(){
  const lotes = activeLotes();
  const byStatus = {OK:0, Próximo:0, Urgente:0, Vencido:0};
  lotes.forEach(l => byStatus[getStatus(l.vencimiento)]++);

  if(chartEstInst) chartEstInst.destroy();
  chartEstInst = new Chart(document.getElementById('chartEstados').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['OK', 'Próximo', 'Urgente', 'Vencido'],
      datasets: [{
        data: [byStatus.OK, byStatus.Próximo, byStatus.Urgente, byStatus.Vencido],
        backgroundColor: ['#22c55e','#eab308','#ef4444','#9ca3af'],
        borderWidth: 2, borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom' },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.raw} lotes` } }
      }
    }
  });

  // Mermas por categoría este mes
  const mermasCat = {};
  const startMonth = new Date(); startMonth.setDate(1); startMonth.setHours(0,0,0,0);
  data.descartados.filter(d => new Date(d.fecha) >= startMonth).forEach(d => {
    mermasCat[d.categoria] = (mermasCat[d.categoria] || 0) + (d.cantidad * d.precio);
  });
  const cats = Object.keys(mermasCat);
  const catColors2 = ['#f97316','#ef4444','#22c55e','#3b82f6','#06b6d4','#8b5cf6','#ec4899'];

  if(chartMermInst) chartMermInst.destroy();
  if(cats.length > 0){
    chartMermInst = new Chart(document.getElementById('chartMermas').getContext('2d'), {
      type: 'bar',
      data: {
        labels: cats,
        datasets: [{ label: 'Costo MXN', data: cats.map(c => mermasCat[c]), backgroundColor: catColors2, borderRadius:8 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '$' + ctx.raw.toLocaleString('es-MX') } } },
        scales: { y: { ticks: { callback: v => '$' + v.toLocaleString('es-MX') } } }
      }
    });
  } else {
    document.getElementById('chartMermas').parentElement.innerHTML += '<p class="text-gray-400 text-center text-sm py-4">Sin mermas registradas este mes</p>';
  }

  const totalMermasMes = Object.values(mermasCat).reduce((s,v) => s+v, 0);
  const totalDescartadosMes = data.descartados.filter(d => new Date(d.fecha) >= startMonth).length;
  const lotesTotales = lotes.length;

  document.getElementById('statsResumen').innerHTML = [
    {label:'Artículos descartados este mes', val: totalDescartadosMes, suffix:'', cls:'text-red-600'},
    {label:'Costo mermas este mes', val: '$' + totalMermasMes.toLocaleString('es-MX', {minimumFractionDigits:2}), suffix:'MXN', cls:'accent'},
    {label:'Lotes activos en inventario', val: lotesTotales, suffix:'', cls:'text-gray-800'}
  ].map(s => `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p class="text-xs text-gray-500 mb-1">${s.label}</p>
      <p class="text-2xl font-bold ${s.cls}">${s.val}</p>
      ${s.suffix ? `<p class="text-xs text-gray-400">${s.suffix}</p>` : ''}
    </div>
  `).join('');
}

function populateLoteProductos(){
  const sel = document.getElementById('loteProducto');
  sel.innerHTML = '<option value="">Seleccionar producto...</option>' + data.productos.map(p => `<option value="${p.id}">${p.nombre} (${p.categoria})</option>`).join('');
  const hoy = new Date();
  document.getElementById('loteRecibido').value = hoy.toISOString().split('T')[0];
  document.getElementById('loteVencimiento').value = '';
  document.getElementById('loteCantidad').value = '';
}

function guardarProducto(){
  const nombre = document.getElementById('prodNombre').value.trim();
  if(!nombre){ alert('Nombre requerido'); return; }
  data.productos.push({
    id: 'pr' + Date.now(),
    nombre,
    categoria: document.getElementById('prodCategoria').value,
    unidad: document.getElementById('prodUnidad').value,
    precio: parseFloat(document.getElementById('prodPrecio').value) || 0
  });
  saveData();
  closeModal('modalAgregarProducto');
  alert('Producto guardado. Ahora puedes agregar un lote.');
}

function guardarLote(){
  const prodId = document.getElementById('loteProducto').value;
  const cantidad = parseFloat(document.getElementById('loteCantidad').value);
  const vencimiento = document.getElementById('loteVencimiento').value;
  if(!prodId || !cantidad || !vencimiento){ alert('Completa todos los campos requeridos'); return; }
  data.lotes.push({
    id: 'l' + Date.now(),
    productoId: prodId,
    cantidad,
    vencimiento,
    recibido: document.getElementById('loteRecibido').value || today(),
    ubicacion: document.getElementById('loteUbicacion').value,
    status: 'activo'
  });
  saveData();
  closeModal('modalAgregarLote');
  renderDashboard();
  alert('Lote agregado correctamente');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('footerYear').textContent = new Date().getFullYear();
  loadData();
  renderDashboard();
  document.querySelectorAll('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if(e.target === m) m.classList.add('hidden'); }));
});
</script>
</body>
</html>
