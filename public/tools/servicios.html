<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiAgenda — Agenda de Servicios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
      colors: {
        brand: { blue: '#0369a1', orange: '#f97316' }
      }
    }
  }
}
</script>
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  .fade-in { animation: fadeIn 0.35s ease forwards; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .slide-in { animation: slideIn 0.25s ease forwards; }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  .status-agendado  { background:#dbeafe; color:#1d4ed8; }
  .status-encamino  { background:#fef9c3; color:#a16207; }
  .status-completado{ background:#dcfce7; color:#16a34a; }
  .status-cancelado { background:#fee2e2; color:#dc2626; }
  .dark .status-agendado  { background:#1e3a5f; color:#93c5fd; }
  .dark .status-encamino  { background:#3d2e00; color:#fde047; }
  .dark .status-completado{ background:#14402a; color:#86efac; }
  .dark .status-cancelado { background:#3f1515; color:#fca5a5; }
  .tab-active { border-bottom: 3px solid #0369a1; color: #0369a1; font-weight:700; }
  .dark .tab-active { border-color:#38bdf8; color:#38bdf8; }
  .cal-day { min-height: 90px; }
  .appt-pill { font-size:0.7rem; line-height:1.1; border-radius:6px; padding:3px 6px; margin-bottom:3px; cursor:pointer; transition:transform .15s; }
  .appt-pill:hover { transform:scale(1.03); }
  @media print {
    .no-print { display:none !important; }
    body { background:white !important; color:black !important; }
    .print-card { box-shadow: none !important; border: 1px solid #ccc !important; }
  }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:4px; }
  .dark ::-webkit-scrollbar-thumb { background:#475569; }
  input, select, textarea { outline: none; }
  input:focus, select:focus, textarea:focus { ring: 2px solid #0369a1; }
  .modal-bg { backdrop-filter: blur(3px); }
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

<!-- HEADER -->
<header class="no-print sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#0369a1,#f97316)">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </div>
      <div>
        <h1 class="text-lg font-800 leading-none text-gray-900 dark:text-white" style="font-weight:800">ServiAgenda</h1>
        <p class="text-xs text-gray-500 dark:text-gray-400">Agenda de Servicios</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Cambiar tema">
        <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" stroke-width="2" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button onclick="openNewAppointment()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-white text-sm font-600 transition-all hover:opacity-90 active:scale-95" style="background:#0369a1;font-weight:600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        Nuevo
      </button>
    </div>
  </div>
  <!-- TABS -->
  <nav class="max-w-7xl mx-auto px-4 flex gap-0 overflow-x-auto border-t border-gray-100 dark:border-gray-800">
    <button onclick="showTab('calendar')" id="tab-calendar" class="tab-btn tab-active py-3 px-4 text-sm whitespace-nowrap border-b-2 border-transparent transition-all">📅 Calendario</button>
    <button onclick="showTab('route')" id="tab-route" class="tab-btn py-3 px-4 text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap border-b-2 border-transparent transition-all hover:text-gray-700">🗺️ Ruta de Hoy</button>
    <button onclick="showTab('clients')" id="tab-clients" class="tab-btn py-3 px-4 text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap border-b-2 border-transparent transition-all hover:text-gray-700">👥 Clientes</button>
    <button onclick="showTab('earnings')" id="tab-earnings" class="tab-btn py-3 px-4 text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap border-b-2 border-transparent transition-all hover:text-gray-700">💰 Ganancias</button>
  </nav>
</header>

<main class="max-w-7xl mx-auto px-4 py-5">

<!-- ===================== TAB: CALENDAR ===================== -->
<section id="tab-calendar-content" class="fade-in">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h2 class="text-xl font-700 text-gray-900 dark:text-white" style="font-weight:700" id="week-label">Semana actual</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400" id="week-range"></p>
    </div>
    <div class="flex gap-2">
      <button onclick="prevWeek()" class="p-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button onclick="goToday()" class="px-3 py-2 rounded-lg text-xs font-600 border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" style="font-weight:600">Hoy</button>
      <button onclick="nextWeek()" class="p-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- WEEKLY GRID -->
  <div class="overflow-x-auto rounded-2xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-sm">
    <div class="grid grid-cols-7 min-w-[700px]">
      <!-- Day headers -->
      <div id="cal-headers" class="contents"></div>
      <!-- Day cells -->
      <div id="cal-cells" class="contents"></div>
    </div>
  </div>

  <!-- Quick stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4" id="week-stats"></div>
</section>

<!-- ===================== TAB: ROUTE ===================== -->
<section id="tab-route-content" class="hidden fade-in">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h2 class="text-xl font-700 dark:text-white" style="font-weight:700">Ruta de Hoy</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400" id="today-label"></p>
    </div>
  </div>
  <div id="route-list" class="space-y-3"></div>
  <div id="route-empty" class="hidden text-center py-16 text-gray-400">
    <div class="text-5xl mb-3">🏖️</div>
    <p class="font-600" style="font-weight:600">Sin servicios hoy</p>
    <p class="text-sm">¡Disfruta tu día libre!</p>
  </div>
</section>

<!-- ===================== TAB: CLIENTS ===================== -->
<section id="tab-clients-content" class="hidden fade-in">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-700 dark:text-white" style="font-weight:700">Base de Clientes</h2>
    <button onclick="openNewClient()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-white text-sm font-600 transition-all hover:opacity-90" style="background:#f97316;font-weight:600">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
      Nuevo cliente
    </button>
  </div>
  <div class="mb-4">
    <input type="text" id="client-search" placeholder="Buscar cliente por nombre o colonia..." oninput="renderClients()" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm focus:ring-2 focus:ring-blue-500 transition-all">
  </div>
  <div id="clients-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
</section>

<!-- ===================== TAB: EARNINGS ===================== -->
<section id="tab-earnings-content" class="hidden fade-in">
  <h2 class="text-xl font-700 dark:text-white mb-4" style="font-weight:700">Resumen de Ganancias</h2>
  <div id="earnings-content"></div>
</section>

</main>

<!-- =================== MODAL: NEW/EDIT APPOINTMENT =================== -->
<div id="modal-appointment" class="fixed inset-0 z-50 hidden modal-bg">
  <div class="absolute inset-0 bg-black/50" onclick="closeModal('modal-appointment')"></div>
  <div class="absolute inset-x-4 top-4 bottom-4 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[560px] md:top-8 md:bottom-auto overflow-y-auto">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 slide-in">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-700 dark:text-white" style="font-weight:700" id="appointment-modal-title">Nuevo Servicio</h3>
        <button onclick="closeModal('modal-appointment')" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="appointment-form" onsubmit="saveAppointment(event)" class="space-y-4">
        <input type="hidden" id="appt-id">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Cliente *</label>
            <select id="appt-client" required class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm" onchange="autoFillClient()">
              <option value="">Seleccionar cliente...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Teléfono</label>
            <input type="tel" id="appt-phone" placeholder="55 1234 5678" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Dirección *</label>
          <input type="text" id="appt-address" required placeholder="Calle, número, colonia, ciudad" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Tipo de servicio *</label>
            <select id="appt-service" required class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm" onchange="autoFillCost()">
              <option value="">Seleccionar...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Costo estimado (MXN) *</label>
            <input type="number" id="appt-cost" required placeholder="0" min="0" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Fecha *</label>
            <input type="date" id="appt-date" required class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Hora *</label>
            <input type="time" id="appt-time" required class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Duración (hrs)</label>
            <input type="number" id="appt-duration" placeholder="2" min="0.5" step="0.5" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Notas</label>
          <textarea id="appt-notes" rows="2" placeholder="Instrucciones especiales, acceso, referencias..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Estado</label>
          <div class="flex gap-2 flex-wrap">
            <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="appt-status" value="Agendado" checked class="accent-blue-600"> <span class="status-agendado px-2 py-0.5 rounded-full text-xs font-600" style="font-weight:600">Agendado</span></label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="appt-status" value="En camino" class="accent-yellow-500"> <span class="status-encamino px-2 py-0.5 rounded-full text-xs font-600" style="font-weight:600">En camino</span></label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="appt-status" value="Completado" class="accent-green-600"> <span class="status-completado px-2 py-0.5 rounded-full text-xs font-600" style="font-weight:600">Completado</span></label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="appt-status" value="Cancelado" class="accent-red-500"> <span class="status-cancelado px-2 py-0.5 rounded-full text-xs font-600" style="font-weight:600">Cancelado</span></label>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal('modal-appointment')" class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-600 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" style="font-weight:600">Cancelar</button>
          <button type="submit" class="flex-1 py-2.5 rounded-xl text-white text-sm font-700 hover:opacity-90 transition-all" style="background:#0369a1;font-weight:700">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- =================== MODAL: APPOINTMENT DETAIL =================== -->
<div id="modal-detail" class="fixed inset-0 z-50 hidden modal-bg">
  <div class="absolute inset-0 bg-black/50" onclick="closeModal('modal-detail')"></div>
  <div class="absolute inset-x-4 top-8 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[520px] overflow-y-auto" style="max-height:90vh">
    <div id="detail-content" class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 slide-in"></div>
  </div>
</div>

<!-- =================== MODAL: NEW CLIENT =================== -->
<div id="modal-client" class="fixed inset-0 z-50 hidden modal-bg">
  <div class="absolute inset-0 bg-black/50" onclick="closeModal('modal-client')"></div>
  <div class="absolute inset-x-4 top-8 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[480px] overflow-y-auto" style="max-height:90vh">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 slide-in">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-700 dark:text-white" style="font-weight:700" id="client-modal-title">Nuevo Cliente</h3>
        <button onclick="closeModal('modal-client')" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="client-form" onsubmit="saveClient(event)" class="space-y-4">
        <input type="hidden" id="client-id">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Nombre completo *</label>
            <input type="text" id="client-name" required placeholder="Juan Pérez González" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Teléfono *</label>
            <input type="tel" id="client-phone" required placeholder="55 1234 5678" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Email</label>
            <input type="email" id="client-email" placeholder="juan@email.com" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Dirección principal *</label>
            <input type="text" id="client-address" required placeholder="Calle 123, Col. Centro, CDMX" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Colonia</label>
            <input type="text" id="client-neighborhood" placeholder="Del Valle" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div>
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Ciudad</label>
            <input type="text" id="client-city" placeholder="CDMX" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-600 text-gray-700 dark:text-gray-300 mb-1.5" style="font-weight:600">Notas del cliente</label>
            <textarea id="client-notes" rows="2" placeholder="Preferencias, acceso, referencias especiales..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm resize-none"></textarea>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal('modal-client')" class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-600 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" style="font-weight:600">Cancelar</button>
          <button type="submit" class="flex-1 py-2.5 rounded-xl text-white text-sm font-700 hover:opacity-90 transition-all" style="background:#f97316;font-weight:700">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- =================== MODAL: INVOICE PRINT =================== -->
<div id="modal-invoice" class="fixed inset-0 z-50 hidden modal-bg">
  <div class="absolute inset-0 bg-black/50 no-print" onclick="closeModal('modal-invoice')"></div>
  <div class="absolute inset-x-4 top-4 bottom-4 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[580px] md:top-8 md:bottom-auto overflow-y-auto">
    <div id="invoice-content" class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 slide-in print-card"></div>
  </div>
</div>

<!-- =================== TOAST =================== -->
<div id="toast" class="fixed bottom-4 right-4 z-[100] hidden">
  <div class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-5 py-3 rounded-xl shadow-xl text-sm font-600 flex items-center gap-2 slide-in" style="font-weight:600" id="toast-content"></div>
</div>

<!-- =================== FOOTER =================== -->
<footer class="no-print mt-12 py-6 border-t border-gray-200 dark:border-gray-800 text-center">
  <p class="text-xs text-gray-400 dark:text-gray-600">Powered by <span class="font-700" style="font-weight:700;color:#0369a1">Novamente Studio</span></p>
</footer>

<script>
// ===========================
// DATA & STATE
// ===========================

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark');
  document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
  document.getElementById('moon-icon').classList.toggle('hidden', isDark);
  localStorage.setItem('serviagenda_theme', isDark ? 'dark' : 'light');
}
function initTheme() {
  const t = localStorage.getItem('serviagenda_theme');
  if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
    document.getElementById('sun-icon').classList.remove('hidden');
    document.getElementById('moon-icon').classList.add('hidden');
  }
}

}

// ===========================
// CALENDAR
// ===========================
function getWeekDates(offset = 0) {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - day + 1 + offset * 7);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i - 1); // start Sunday
    return d;
  });
}

function renderCalendar() {
  // We'll show Mon-Sun
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const monday = new Date(today);
  const day = today.getDay() === 0 ? 6 : today.getDay() - 1;
  monday.setDate(today.getDate() - day + currentWeekOffset * 7);

  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });

  document.getElementById('week-range').textContent =
    `${days[0].getDate()} de ${MONTHS_ES[days[0].getMonth()]} — ${days[6].getDate()} de ${MONTHS_ES[days[6].getMonth()]} ${days[6].getFullYear()}`;

  const appts = getAppts();
  const headers = document.getElementById('cal-headers');
  const cells = document.getElementById('cal-cells');

  headers.innerHTML = days.map(d => {
    const dStr = d.toISOString().split('T')[0];
    const isToday = dStr === todayStr;
    return `<div class="py-3 px-2 text-center border-b border-r last:border-r-0 border-gray-200 dark:border-gray-800 ${isToday ? 'bg-blue-50 dark:bg-blue-950/30' : ''}">
      <div class="text-xs font-600 text-gray-500 dark:text-gray-400 uppercase tracking-wide" style="font-weight:600">${DAYS_ES[(d.getDay())]}</div>
      <div class="text-lg font-700 mt-0.5 ${isToday ? 'text-blue-600 dark:text-blue-400' : 'text-gray-900 dark:text-white'}" style="font-weight:700">${d.getDate()}</div>
    </div>`;
  }).join('');

  cells.innerHTML = days.map(d => {
    const dStr = d.toISOString().split('T')[0];
    const isToday = dStr === todayStr;
    const dayAppts = appts.filter(a => a.date === dStr).sort((a,b) => a.time.localeCompare(b.time));
    return `<div class="cal-day p-2 border-r last:border-r-0 border-gray-100 dark:border-gray-800 ${isToday ? 'bg-blue-50/50 dark:bg-blue-950/10' : ''}" onclick="dayClick('${dStr}')">
      ${dayAppts.map(a => `
        <div class="appt-pill ${STATUS_MAP[a.status]?.cls || 'status-agendado'} font-600" style="font-weight:600" onclick="event.stopPropagation(); showDetail('${a.id}')">
          <div>${a.time} ${serviceEmoji(a.category)}</div>
          <div class="truncate">${a.clientName.split(' ')[0]}</div>
        </div>
      `).join('')}
    </div>`;
  }).join('');

  // Week stats
  const allWeekAppts = appts.filter(a => {
    const dStr = days.map(d => d.toISOString().split('T')[0]);
    return dStr.includes(a.date);
  });
  const earned = allWeekAppts.filter(a => a.status === 'Completado').reduce((s,a) => s + Number(a.cost), 0);
  const pending = allWeekAppts.filter(a => a.status === 'Agendado').length;
  const completed = allWeekAppts.filter(a => a.status === 'Completado').length;
  const total = allWeekAppts.length;

  document.getElementById('week-stats').innerHTML = `
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Total semana</p>
      <p class="text-2xl font-800 text-gray-900 dark:text-white" style="font-weight:800">${total}</p>
      <p class="text-xs text-gray-400">servicios</p>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Pendientes</p>
      <p class="text-2xl font-800 text-blue-600 dark:text-blue-400" style="font-weight:800">${pending}</p>
      <p class="text-xs text-gray-400">agendados</p>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Completados</p>
      <p class="text-2xl font-800 text-green-600 dark:text-green-400" style="font-weight:800">${completed}</p>
      <p class="text-xs text-gray-400">servicios</p>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Cobrado</p>
      <p class="text-2xl font-800 dark:text-white" style="font-weight:800;color:#f97316">${fmtMXN(earned)}</p>
      <p class="text-xs text-gray-400">esta semana</p>
    </div>
  `;
}

function serviceEmoji(cat) {
  if (!cat) return '🔧';
  if (cat === 'Plomería') return '🔧';
  if (cat === 'Electricidad') return '⚡';
  if (cat === 'Limpieza') return '🧹';
  return '🔧';
}

function fmtMXN(n) {
  return new Intl.NumberFormat('es-MX', {style:'currency',currency:'MXN',minimumFractionDigits:0}).format(n);
}

function quickStatus(id, status) {
  const appts = getAppts();
  const idx = appts.findIndex(a => a.id === id);
  if (idx === -1) return;

  saveAppts(appts);
  showToast(`Estado cambiado a ${status}`);
  closeModal('modal-detail');
  renderCalendar();
}

function renderRoute() {
  const todayStr = new Date().toISOString().split('T')[0];
  document.getElementById('today-label').textContent = `${DAYS_FULL[new Date().getDay()]}, ${new Date().getDate()} de ${MONTHS_ES[new Date().getMonth()]} ${new Date().getFullYear()}`;

  const appts = getAppts().filter(a => a.date === todayStr && a.status !== 'Cancelado')
    .sort((a,b) => a.time.localeCompare(b.time));

  const list = document.getElementById('route-list');
  const empty = document.getElementById('route-empty');

  if (appts.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = appts.map((a, i) => {

function renderEarnings() {
  const appts = getAppts();
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];

  // Current week
  const day = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const monday = new Date(now); monday.setDate(now.getDate() - day);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const weekStart = monday.toISOString().split('T')[0];
  const weekEnd = sunday.toISOString().split('T')[0];

  // Current month
  const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0];

  function sumCompleted(filter) {
    return appts.filter(filter).filter(a => a.status === 'Completado').reduce((s,a) => s + Number(a.cost), 0);
  }
  function countCompleted(filter) {
    return appts.filter(filter).filter(a => a.status === 'Completado').length;
  }
  function countStatus(status, filter) {
    return appts.filter(filter).filter(a => a.status === status).length;
  }

  const weekFilter = a => a.date >= weekStart && a.date <= weekEnd;
  const monthFilter = a => a.date >= monthStart && a.date <= monthEnd;
  const todayFilter = a => a.date === todayStr;

  const weekEarnings = sumCompleted(weekFilter);
  const weekCount = countCompleted(weekFilter);
  const monthEarnings = sumCompleted(monthFilter);
  const monthCount = countCompleted(monthFilter);
  const todayEarnings = sumCompleted(todayFilter);

  // By category this week
  const catStats = {};
  appts.filter(weekFilter).filter(a => a.status === 'Completado').forEach(a => {
    const cat = a.category || 'Otro';
    catStats[cat] = (catStats[cat] || 0) + Number(a.cost);
  });

  // By day this week
  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    return d.toISOString().split('T')[0];
  });
  const dayEarnings = days.map(d => ({
    day: d,
    label: DAYS_ES[new Date(d+'T12:00:00').getDay()],
    total: sumCompleted(a => a.date === d),
  }));
  const maxDay = Math.max(...dayEarnings.map(d => d.total), 1);

  document.getElementById('earnings-content').innerHTML = `
    <!-- KPIs -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 border border-gray-200 dark:border-gray-800 shadow-sm col-span-2 md:col-span-1">
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wide font-600" style="font-weight:600">Hoy</p>
        <p class="text-3xl font-800 mb-1" style="font-weight:800;color:#f97316">${fmtMXN(todayEarnings)}</p>
        <p class="text-xs text-gray-400">${countCompleted(todayFilter)} servicio(s) completado(s)</p>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 border border-gray-200 dark:border-gray-800 shadow-sm">
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wide font-600" style="font-weight:600">Esta semana</p>
        <p class="text-2xl font-800 text-gray-900 dark:text-white mb-1" style="font-weight:800">${fmtMXN(weekEarnings)}</p>
        <p class="text-xs text-gray-400">${weekCount} completado(s)</p>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 border border-gray-200 dark:border-gray-800 shadow-sm">
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wide font-600" style="font-weight:600">Este mes</p>
        <p class="text-2xl font-800 text-gray-900 dark:text-white mb-1" style="font-weight:800">${fmtMXN(monthEarnings)}</p>
        <p class="text-xs text-gray-400">${monthCount} completado(s)</p>
      </div>
    </div>

    <!-- Bar chart: daily this week -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-5 mb-4">
      <h3 class="font-700 text-gray-900 dark:text-white mb-4 text-sm" style="font-weight:700">Ingresos por día — Semana actual</h3>
      <div class="flex items-end gap-2 h-32">
        ${dayEarnings.map(d => `
          <div class="flex-1 flex flex-col items-center gap-1">
            <p class="text-xs font-700 ${d.day === todayStr ? 'text-orange-500' : 'text-gray-600 dark:text-gray-400'}" style="font-weight:700">${d.total > 0 ? fmtMXN(d.total).replace('MX$','') : ''}</p>
            <div class="w-full rounded-t-lg transition-all" style="height:${Math.max((d.total/maxDay)*100,2)}%;background:${d.day===todayStr?'#f97316':'#0369a1'};opacity:${d.total>0?1:0.2}"></div>
            <p class="text-xs font-600 ${d.day===todayStr?'text-orange-500':'text-gray-500 dark:text-gray-400'}" style="font-weight:600">${d.label}</p>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- By category -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-5 mb-4">
      <h3 class="font-700 text-gray-900 dark:text-white mb-4 text-sm" style="font-weight:700">Por categoría — Esta semana</h3>
      ${Object.keys(catStats).length === 0 ? '<p class="text-sm text-gray-400">Sin ingresos completados esta semana</p>' :
        Object.entries(catStats).map(([cat, total]) => {
          const pct = Math.round((total / weekEarnings) * 100);
          const emoji = cat === 'Plomería' ? '🔧' : cat === 'Electricidad' ? '⚡' : '🧹';
          return `<div class="mb-3">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm font-600 dark:text-gray-200" style="font-weight:600">${emoji} ${cat}</span>
              <span class="text-sm font-700" style="font-weight:700;color:#f97316">${fmtMXN(total)} <span class="text-gray-400 text-xs">(${pct}%)</span></span>
            </div>
            <div class="h-2 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
              <div class="h-full rounded-full" style="width:${pct}%;background:#0369a1"></div>
            </div>
          </div>`;
        }).join('')
      }
    </div>

    <!-- Status summary -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-5">
      <h3 class="font-700 text-gray-900 dark:text-white mb-4 text-sm" style="font-weight:700">Resumen del mes</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        ${['Agendado','En camino','Completado','Cancelado'].map(s => `
          <div class="p-3 rounded-xl ${STATUS_MAP[s].cls} text-center">
            <p class="text-2xl font-800" style="font-weight:800">${countStatus(s, monthFilter)}</p>
            <p class="text-xs font-600 mt-1" style="font-weight:600">${STATUS_MAP[s].emoji} ${s}</p>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function populateServiceSelect() {
  const sel = document.getElementById('appt-service');
  const cats = [...new Set(SERVICE_CATALOG.map(s => s.category))];
  sel.innerHTML = '<option value="">Seleccionar...</option>' +
    cats.map(cat => `<optgroup label="${serviceEmoji(cat)} ${cat}">${
      SERVICE_CATALOG.filter(s => s.category === cat).map(s =>
        `<option value="${s.name}" data-price="${s.basePrice}" data-cat="${s.category}">${s.name}</option>`
      ).join('')
    }</optgroup>`).join('');
}

function populateClientSelect(selectedId = null) {
  const clients = getClients();
  const sel = document.getElementById('appt-client');
  sel.innerHTML = '<option value="">Seleccionar cliente...</option>' +
    clients.map(c => `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.name}</option>`).join('') +
    '<option value="__new__">+ Nuevo cliente...</option>';
}

function autoFillClient() {
  const sel = document.getElementById('appt-client');
  const val = sel.value;
  if (val === '__new__') { closeModal('modal-appointment'); openNewClient(); return; }
  if (!val) return;
  const c = getClients().find(x => x.id === val);
  if (c) {
    document.getElementById('appt-phone').value = c.phone || '';
    document.getElementById('appt-address').value = c.address || '';
  }
}

function autoFillCost() {
  const sel = document.getElementById('appt-service');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.price) {
    document.getElementById('appt-cost').value = opt.dataset.price;
  }
}

function openNewAppointment(dateStr = null, clientId = null) {
  editingAppointmentId = null;
  document.getElementById('appointment-modal-title').textContent = 'Nuevo Servicio';
  document.getElementById('appointment-form').reset();
  document.getElementById('appt-id').value = '';
  populateServiceSelect();
  populateClientSelect(clientId);
  if (clientId) autoFillClient();
  if (dateStr) document.getElementById('appt-date').value = dateStr;
  else document.getElementById('appt-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('appt-time').value = '09:00';
  document.getElementById('appt-duration').value = '2';
  document.querySelector('input[name="appt-status"][value="Agendado"]').checked = true;
  openModal('modal-appointment');
}

function editAppointment(id) {
  const a = getAppts().find(x => x.id === id);
  if (!a) return;
  editingAppointmentId = id;
  document.getElementById('appointment-modal-title').textContent = 'Editar Servicio';
  populateServiceSelect();
  populateClientSelect(a.clientId);
  document.getElementById('appt-id').value = a.id;
  document.getElementById('appt-phone').value = a.phone || '';
  document.getElementById('appt-address').value = a.address || '';
  document.getElementById('appt-date').value = a.date || '';
  document.getElementById('appt-time').value = a.time || '';
  document.getElementById('appt-duration').value = a.duration || 2;
  document.getElementById('appt-cost').value = a.cost || '';
  document.getElementById('appt-notes').value = a.notes || '';
  // Set service
  Array.from(document.getElementById('appt-service').options).forEach(o => {
    if (o.value === a.service) o.selected = true;
  });
  // Set status
  const radio = document.querySelector(`input[name="appt-status"][value="${a.status}"]`);
  if (radio) radio.checked = true;
  closeModal('modal-detail');
  openModal('modal-appointment');
}

function saveAppointment(e) {
  e.preventDefault();
  const appts = getAppts();
  const clientId = document.getElementById('appt-client').value;
  const clientEl = document.getElementById('appt-client');
  const clientName = clientEl.options[clientEl.selectedIndex]?.text || '';
  const serviceSel = document.getElementById('appt-service');
  const serviceOpt = serviceSel.options[serviceSel.selectedIndex];

  const appt = {
    id: editingAppointmentId || uid(),
    clientId,
    clientName,
    phone: document.getElementById('appt-phone').value,
    address: document.getElementById('appt-address').value,
    service: serviceSel.value,
    category: serviceOpt?.dataset?.cat || '',
    date: document.getElementById('appt-date').value,
    time: document.getElementById('appt-time').value,
    duration: parseFloat(document.getElementById('appt-duration').value) || 2,
    cost: parseFloat(document.getElementById('appt-cost').value) || 0,
    notes: document.getElementById('appt-notes').value,
    status: document.querySelector('input[name="appt-status"]:checked')?.value || 'Agendado',
  };

  if (editingAppointmentId) {
    const idx = appts.findIndex(a => a.id === editingAppointmentId);
    if (idx !== -1) appts[idx] = appt;
  } else {
    appts.push(appt);
  }
  saveAppts(appts);
  closeModal('modal-appointment');
  showToast(editingAppointmentId ? 'Servicio actualizado' : 'Servicio agendado');
  renderCalendar();
}

function deleteAppointment(id) {
  if (!confirm('¿Eliminar este servicio?')) return;
  const appts = getAppts().filter(a => a.id !== id);
  saveAppts(appts);
  closeModal('modal-detail');
  showToast('Servicio eliminado');
  renderCalendar();
}

// ===========================
// FORM: CLIENT
// ===========================
function openNewClient() {
  editingClientId = null;
  document.getElementById('client-modal-title').textContent = 'Nuevo Cliente';
  document.getElementById('client-form').reset();
  document.getElementById('client-id').value = '';
  openModal('modal-client');
}

function editClient(id) {
  const c = getClients().find(x => x.id === id);
  if (!c) return;
  editingClientId = id;
  document.getElementById('client-modal-title').textContent = 'Editar Cliente';
  document.getElementById('client-id').value = c.id;
  document.getElementById('client-name').value = c.name || '';
  document.getElementById('client-phone').value = c.phone || '';
  document.getElementById('client-email').value = c.email || '';
  document.getElementById('client-address').value = c.address || '';
  document.getElementById('client-neighborhood').value = c.neighborhood || '';
  document.getElementById('client-city').value = c.city || '';
  document.getElementById('client-notes').value = c.notes || '';
  closeModal('modal-detail');
  openModal('modal-client');
}

function saveClient(e) {
  e.preventDefault();
  const clients = getClients();
  const client = {
    id: editingClientId || uid(),
    name: document.getElementById('client-name').value,
    phone: document.getElementById('client-phone').value,
    email: document.getElementById('client-email').value,
    address: document.getElementById('client-address').value,
    neighborhood: document.getElementById('client-neighborhood').value,
    city: document.getElementById('client-city').value,
    notes: document.getElementById('client-notes').value,
    createdAt: new Date().toISOString().split('T')[0],
  };
  if (editingClientId) {
    const idx = clients.findIndex(c => c.id === editingClientId);
    if (idx !== -1) clients[idx] = client;
  } else {
    clients.push(client);
  }
  saveClients(clients);
  closeModal('modal-client');
  showToast(editingClientId ? 'Cliente actualizado' : 'Cliente guardado');
  renderClients();
}

// ===========================
// MODAL HELPERS
// ===========================
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  document.body.style.overflow = '';
}

// ===========================
// TOAST
// ===========================
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-content').textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2800);
}

// ===========================
// UTILS
// ===========================
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return `${d.getDate()} ${MONTHS_ES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
}

// INIT
// ===========================
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  initDemo();
  renderCalendar();
  renderRoute(); // pre-load route
  showTab('calendar');
});
</script>
