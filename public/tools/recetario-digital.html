<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetario Digital — Restaurante</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  body { background: #fefce8; }
  .amber-grad { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .tab-btn { padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .tab-btn.active { background: #d97706; color: #fff; }
  .tab-btn:not(.active) { color: #92400e; background: #fef3c7; }
  .cat-btn { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .cat-btn.active { background: #d97706; color: #fff; }
  .cat-btn:not(.active) { color: #92400e; background: #fef3c7; border: 1px solid #fcd34d; }
  .recipe-card { border-radius: 14px; background: #fff; border: 2px solid transparent; cursor: pointer; transition: all .2s; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .recipe-card:hover, .recipe-card.selected { border-color: #d97706; box-shadow: 0 4px 16px rgba(217,119,6,.15); }
  .cost-bar { height: 6px; border-radius: 3px; background: #fef3c7; }
  .cost-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#d97706,#f59e0b); transition: width .5s; }
  input, select, textarea { outline: none; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 8px 12px; font-size: 14px; width: 100%; transition: border .15s; font-family: 'Plus Jakarta Sans',sans-serif; }
  input:focus, select:focus, textarea:focus { border-color: #d97706; }
  .btn-amber { background: #d97706; color: #fff; border-radius: 10px; padding: 9px 20px; font-weight: 700; font-size: 13px; cursor: pointer; transition: background .15s; border: none; }
  .btn-amber:hover { background: #b45309; }
  .btn-outline { border: 1.5px solid #d97706; color: #d97706; border-radius: 10px; padding: 8px 18px; font-weight: 700; font-size: 13px; cursor: pointer; background: #fff; transition: all .15s; }
  .btn-outline:hover { background: #fef3c7; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: #fff; border-radius: 20px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 28px; }
  .section-title { font-size: 18px; font-weight: 800; color: #92400e; margin-bottom: 12px; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #fef3c7; } ::-webkit-scrollbar-thumb { background: #fcd34d; border-radius: 3px; }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff !important; }
    .print-recipe { display: block !important; }
    .card { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
  }
  .print-recipe { display: none; }
</style>
</head>
<body class="min-h-screen">

<!-- HEADER -->
<header class="amber-grad text-white no-print">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-4 flex-wrap">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">🍳</div>
      <div>
        <div class="font-bold text-lg leading-tight">Recetario Digital</div>
        <div class="text-amber-100 text-xs">Gestión de recetas para restaurantes</div>
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="openNewRecipe()" class="bg-white/20 hover:bg-white/30 text-white font-bold px-4 py-2 rounded-xl text-sm transition">+ Nueva Receta</button>
      <button onclick="showView('dashboard')" class="tab-btn" id="tab-dashboard">Dashboard</button>
    </div>
  </div>
</header>

<!-- TABS NAV -->
<nav class="no-print bg-white border-b border-amber-100 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto">
    <button onclick="showView('lista')" class="tab-btn active" id="tab-lista">📋 Recetas</button>
    <button onclick="showView('detalle')" class="tab-btn" id="tab-detalle">📖 Detalle</button>
    <button onclick="showView('calculadora')" class="tab-btn" id="tab-calculadora">⚖️ Calculadora</button>
    <button onclick="showView('costos')" class="tab-btn" id="tab-costos">💰 Análisis Costos</button>
    <button onclick="showView('dashboard')" class="tab-btn" id="tab-dash2">📊 Dashboard</button>
  </div>
</nav>

<!-- MAIN -->
<main class="max-w-6xl mx-auto px-4 py-6 no-print">

  <!-- LISTA DE RECETAS -->
  <div id="view-lista">
    <!-- Category filter -->
    <div class="flex gap-2 flex-wrap mb-4">
      <button class="cat-btn active" onclick="filterCat(this,'Todas')">Todas</button>
      <button class="cat-btn" onclick="filterCat(this,'Entradas')">Entradas</button>
      <button class="cat-btn" onclick="filterCat(this,'Principales')">Principales</button>
      <button class="cat-btn" onclick="filterCat(this,'Postres')">Postres</button>
      <button class="cat-btn" onclick="filterCat(this,'Bebidas')">Bebidas</button>
      <button class="cat-btn" onclick="filterCat(this,'Salsas')">Salsas</button>
    </div>
    <!-- Search -->
    <div class="mb-4">
      <input type="search" id="searchRecipe" placeholder="Buscar receta..." oninput="renderRecipes()" class="max-w-sm">
    </div>
    <!-- Grid -->
    <div id="recipes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>

  <!-- DETALLE RECETA -->
  <div id="view-detalle" class="hidden">
    <div id="detail-content" class="space-y-5"></div>
  </div>

  <!-- CALCULADORA DE PORCIONES -->
  <div id="view-calculadora" class="hidden">
    <div class="card p-6 max-w-2xl">
      <h2 class="section-title">⚖️ Calculadora de Porciones</h2>
      <div class="mb-4">
        <label class="text-sm font-600 text-gray-600 block mb-1">Selecciona receta</label>
        <select id="calc-recipe" onchange="calcLoad()">
          <option value="">— Seleccionar —</option>
        </select>
      </div>
      <div id="calc-body" class="hidden">
        <div class="flex gap-3 mb-5 flex-wrap">
          <button onclick="calcScale(.5)" class="btn-outline">0.5x</button>
          <button onclick="calcScale(1)" class="btn-outline btn-amber">1x</button>
          <button onclick="calcScale(2)" class="btn-outline">2x</button>
          <button onclick="calcScale(3)" class="btn-outline">3x</button>
          <button onclick="calcScale(4)" class="btn-outline">4x</button>
          <div class="flex items-center gap-2">
            <input type="number" id="custom-scale" placeholder="Personalizado" class="w-32" min="0.1" step="0.1" oninput="calcScale(parseFloat(this.value)||1)">
            <span class="text-sm text-gray-500">x</span>
          </div>
        </div>
        <div class="bg-amber-50 rounded-xl p-4 mb-4">
          <div class="flex justify-between items-center mb-3">
            <span class="font-700 text-amber-900" id="calc-name"></span>
            <span class="badge bg-amber-100 text-amber-800" id="calc-portions"></span>
          </div>
          <table class="w-full text-sm">
            <thead><tr class="text-left text-gray-500 text-xs uppercase"><th class="pb-2">Ingrediente</th><th class="pb-2">Cantidad</th><th class="pb-2">Unidad</th><th class="pb-2">Costo</th></tr></thead>
            <tbody id="calc-table"></tbody>
          </table>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="card p-3 text-center">
            <div class="text-xs text-gray-500 mb-1">Costo total receta</div>
            <div class="text-2xl font-800 text-amber-700" id="calc-total-cost"></div>
          </div>
          <div class="card p-3 text-center">
            <div class="text-xs text-gray-500 mb-1">Costo por porción</div>
            <div class="text-2xl font-800 text-green-700" id="calc-cost-per"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ANÁLISIS DE COSTOS -->
  <div id="view-costos" class="hidden">
    <div id="costos-content" class="space-y-5"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="hidden">
    <div id="dashboard-content"></div>
  </div>

</main>

<!-- MODAL NUEVA / EDITAR RECETA -->
<div id="modal-recipe" class="modal-bg hidden">
  <div class="modal">
    <div class="flex justify-between items-center mb-5">
      <h2 class="text-xl font-800 text-amber-900" id="modal-title">Nueva Receta</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">&times;</button>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div><label class="text-xs font-600 text-gray-500 block mb-1">Nombre</label><input id="r-name" type="text" placeholder="Ej. Guacamole Clásico"></div>
      <div><label class="text-xs font-600 text-gray-500 block mb-1">Categoría</label>
        <select id="r-cat"><option>Entradas</option><option>Principales</option><option>Postres</option><option>Bebidas</option><option>Salsas</option></select>
      </div>
      <div><label class="text-xs font-600 text-gray-500 block mb-1">Porciones base</label><input id="r-portions" type="number" value="4" min="1"></div>
      <div><label class="text-xs font-600 text-gray-500 block mb-1">Tiempo preparación</label><input id="r-time" type="text" placeholder="Ej. 20 min"></div>
    </div>
    <div class="mb-4">
      <div class="flex justify-between items-center mb-2">
        <label class="text-xs font-600 text-gray-500">Ingredientes</label>
        <button onclick="addIngRow()" class="text-amber-700 text-xs font-700 hover:underline">+ Agregar</button>
      </div>
      <table class="w-full text-sm">
        <thead><tr class="text-left text-gray-400 text-xs"><th class="pb-1">Ingrediente</th><th class="pb-1">Cantidad</th><th class="pb-1">Unidad</th><th class="pb-1">Costo(MXN)</th><th></th></tr></thead>
        <tbody id="ing-table"></tbody>
      </table>
    </div>
    <div class="mb-4">
      <label class="text-xs font-600 text-gray-500 block mb-1">Instrucciones (paso a paso)</label>
      <textarea id="r-steps" rows="5" placeholder="1. Partir los aguacates por la mitad...&#10;2. Retirar el hueso...&#10;3. ..."></textarea>
    </div>
    <div class="flex gap-3 justify-end">
      <button onclick="closeModal()" class="btn-outline">Cancelar</button>
      <button onclick="saveRecipe()" class="btn-amber">Guardar Receta</button>
    </div>
  </div>
</div>

<!-- PRINT RECIPE CARD -->
<div class="print-recipe" id="print-area"></div>

<!-- FOOTER -->
<footer class="no-print text-center py-6 text-xs text-amber-700 opacity-60 mt-8">
  Powered by <strong>Novamente Studio</strong> — recetario-digital v1.0
</footer>

// ===================== STATE =====================
let recipes = [];
let selectedCat = 'Todas';
let selectedRecipeId = null;
let editingId = null;
let ingRows = [];
let calcMultiplier = 1;

function load() {
  const s = localStorage.getItem('recetario');
  if(s) { recipes = JSON.parse(s); } else { recipes = JSON.parse(JSON.stringify(DEMO_RECIPES)); save(); }
}
function save() { localStorage.setItem('recetario', JSON.stringify(recipes)); }

// ===================== VIEWS =====================
const views = ['lista','detalle','calculadora','costos','dashboard'];
const tabs = ['lista','detalle','calculadora','costos','dash2'];

function showView(v) {
  views.forEach(x => { const el=document.getElementById('view-'+x); if(el) el.classList.add('hidden'); });
  document.getElementById('view-'+v).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(v==='dashboard') { document.getElementById('tab-dash2').classList.add('active'); buildDashboard(); }
  else { const t=document.getElementById('tab-'+v); if(t) t.classList.add('active'); }
  if(v==='detalle') buildDetail();
  if(v==='calculadora') buildCalcSelect();
  if(v==='costos') buildCostos();
}

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = cat;
  renderRecipes();
}

// ===================== RECIPE LIST =====================
function renderRecipes() {
  const q = document.getElementById('searchRecipe').value.toLowerCase();
  let list = recipes.filter(r => {
    const matchCat = selectedCat==='Todas' || r.category===selectedCat;
    const matchQ = r.name.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  const grid = document.getElementById('recipes-grid');

  grid.innerHTML = list.map(r => {
    const totalCost = r.ingredients.reduce((s,i)=>s+i.cost,0);
    const costPer = (totalCost/r.portions).toFixed(2);
    const suggested = (totalCost/r.portions/0.31).toFixed(2);

function selectRecipe(id) {

// ===================== CALCULADORA =====================
function buildCalcSelect() {
  const sel = document.getElementById('calc-recipe');
  sel.innerHTML = '<option value="">— Seleccionar —</option>' +
    recipes.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
  if(selectedRecipeId) { sel.value = selectedRecipeId; calcLoad(); }
}

function calcLoad() {
  const id = parseInt(document.getElementById('calc-recipe').value);
  if(!id){ document.getElementById('calc-body').classList.add('hidden'); return; }
  selectedRecipeId = id;
  document.getElementById('calc-body').classList.remove('hidden');
  calcScale(1);
}

function calcScale(m) {
  if(!m||isNaN(m)||m<=0) m=1;
  calcMultiplier = m;
  const id = parseInt(document.getElementById('calc-recipe').value);
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('calc-name').textContent = r.name;
  document.getElementById('calc-portions').textContent = `${(r.portions*m).toFixed(1)} porciones`;
  const tbody = document.getElementById('calc-table');
  let total = 0;
  tbody.innerHTML = r.ingredients.map(i=>{
    const scaledCost = i.cost*m;
    total += scaledCost;
    return `<tr class="border-b border-gray-50"><td class="py-1.5 text-gray-700">${i.name}</td><td class="py-1.5 font-600">${(i.qty*m).toFixed(2)}</td><td class="py-1.5 text-gray-500">${i.unit}</td><td class="py-1.5 text-amber-700 font-600">$${scaledCost.toFixed(2)}</td></tr>`;
  }).join('');
  document.getElementById('calc-total-cost').textContent = `$${total.toFixed(2)} MXN`;
  document.getElementById('calc-cost-per').textContent = `$${(total/(r.portions*m)).toFixed(2)} MXN`;
}

              <td class="py-2 pr-3 font-600 text-gray-800">${r.name}</td>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
      <div class="card p-4">

// ===================== MODAL =====================
function openNewRecipe() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nueva Receta';
  document.getElementById('r-name').value='';
  document.getElementById('r-cat').value='Entradas';
  document.getElementById('r-portions').value=4;
  document.getElementById('r-time').value='';
  document.getElementById('r-steps').value='';
  ingRows = [{name:'',qty:1,unit:'g',cost:0}];
  renderIngTable();
  document.getElementById('modal-recipe').classList.remove('hidden');
}

function openEditRecipe(id) {
  editingId = id;
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('modal-title').textContent = 'Editar Receta';
  document.getElementById('r-name').value = r.name;
  document.getElementById('r-cat').value = r.category;
  document.getElementById('r-portions').value = r.portions;
  document.getElementById('r-time').value = r.time||'';
  document.getElementById('r-steps').value = r.steps||'';
  ingRows = r.ingredients.map(i=>({...i}));
  renderIngTable();
  document.getElementById('modal-recipe').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-recipe').classList.add('hidden'); }

function addIngRow() { ingRows.push({name:'',qty:1,unit:'g',cost:0}); renderIngTable(); }
function removeIngRow(i) { ingRows.splice(i,1); renderIngTable(); }

function renderIngTable() {
  const tbody = document.getElementById('ing-table');
  tbody.innerHTML = ingRows.map((row,i)=>`
    <tr>
      <td class="pr-2 py-1"><input type="text" value="${row.name}" onchange="ingRows[${i}].name=this.value" placeholder="Ingrediente"></td>
      <td class="pr-2 py-1"><input type="number" value="${row.qty}" onchange="ingRows[${i}].qty=parseFloat(this.value)||0" class="w-20" step="0.01" min="0"></td>
      <td class="pr-2 py-1">
        <select onchange="ingRows[${i}].unit=this.value" class="w-24">
          ${UNITS.map(u=>`<option ${u===row.unit?'selected':''}>${u}</option>`).join('')}
        </select>
      </td>
      <td class="pr-2 py-1"><input type="number" value="${row.cost}" onchange="ingRows[${i}].cost=parseFloat(this.value)||0" class="w-24" step="0.01" min="0" placeholder="$0.00"></td>
      <td><button onclick="removeIngRow(${i})" class="text-red-400 hover:text-red-600 text-lg font-bold px-2">&times;</button></td>
    </tr>`).join('');
}

function saveRecipe() {
  const name = document.getElementById('r-name').value.trim();
  if(!name){ alert('Ingresa el nombre de la receta.'); return; }
  const recipe = {
    id: editingId || Date.now(),
    name, category: document.getElementById('r-cat').value,
    portions: parseInt(document.getElementById('r-portions').value)||4,
    time: document.getElementById('r-time').value.trim(),
    ingredients: ingRows.filter(r=>r.name.trim()),
    steps: document.getElementById('r-steps').value.trim(),
  };
  if(editingId) { const idx=recipes.findIndex(x=>x.id===editingId); if(idx>-1) recipes[idx]=recipe; }
  else { recipes.push(recipe); }
  save();
  closeModal();
  renderRecipes();
  if(selectedRecipeId===editingId) buildDetail();
}

function deleteRecipe(id) {
  if(!confirm('¿Eliminar esta receta?')) return;
  recipes = recipes.filter(x=>x.id!==id);
  if(selectedRecipeId===id) { selectedRecipeId=null; }
  save(); renderRecipes();
}

    .cost-item .lbl { font-size: 11px; color: #666; }
    .footer { margin-top: 30px; font-size: 10px; color: #aaa; text-align: center; }
  </style></head><body>
  <div class="header">
    <h1>${r.name}</h1>
    <div class="meta">${r.category} &bull; ${r.portions} porciones &bull; ${r.time||'—'}</div>
  </div>
  <h3>Ingredientes</h3>
  <table>
    <thead><tr><th>Ingrediente</th><th>Cantidad</th><th>Unidad</th><th>Costo MXN</th></tr></thead>
    <tbody>${r.ingredients.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.unit}</td><td>$${i.cost.toFixed(2)}</td></tr>`).join('')}</tbody>
  </table>
  ${steps.length ? `<h3>Instrucciones</h3><ol>${steps.map(s=>`<li>${s.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol>` : ''}
  <div class="cost-box">
    <div class="cost-item"><div class="val">$${tc.toFixed(2)}</div><div class="lbl">Costo receta</div></div>
    <div class="cost-item"><div class="val">$${cp}</div><div class="lbl">Costo/porción</div></div>
    <div class="cost-item"><div class="val">$${sp}</div><div class="lbl">Precio sugerido</div></div>
  </div>
  <div class="footer">Powered by Novamente Studio &bull; Recetario Digital</div>
  </body></html>`);
  w.document.close();
  w.print();
}

// ===================== WHATSAPP SHARE =====================
function shareRecipeWA(id) {
  const r = recipes.find(x=>x.id===id); if(!r) return;
  const tc = r.ingredients.reduce((s,i)=>s+i.cost,0);
  const cp = (tc/r.portions).toFixed(2);
  const sp = (tc/r.portions/0.31).toFixed(2);
  const ings = r.ingredients.slice(0,5).map(i=>`- ${i.name}: ${i.qty} ${i.unit}`).join('\n');
  const msg = `*Receta: ${r.name}*\nCategoria: ${r.category} | Porciones: ${r.portions}\n\nIngredientes principales:\n${ings}\n\nCosto/porcion: $${cp} MXN\nPrecio sugerido (30%FC): $${sp} MXN\n\n_Compartido desde Recetario Digital — Novamente Studio_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}
