<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Empleados — Novamente Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { font-family: 'Plus Jakarta Sans', sans-serif; }
.indigo-grad { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
.card-hover { transition: all .2s ease; }
.card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,.15); }
.avatar { width:52px;height:52px;min-width:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800; }
.big-av { width:66px;height:66px;min-width:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800; }
.dept-badge { display:inline-block;padding:2px 9px;border-radius:9999px;font-size:11px;font-weight:600; }
@media print {
  .no-print { display:none!important; }
  body { background:white!important; }
  .print-card { page-break-inside:avoid; }
}
</style>
</head>
<body class="bg-indigo-50 min-h-screen">

<header class="indigo-grad text-white shadow-lg no-print">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between flex-wrap gap-3">
    <div class="flex items-center gap-3">
      <div class="bg-white/20 rounded-xl p-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </div>
      <div>
        <h1 class="text-xl font-bold">Directorio de Empleados</h1>
        <p class="text-indigo-100 text-xs">Gestion de personal, cumpleanos y aniversarios</p>
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="openForm(null)" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-xl text-sm font-semibold transition-all flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nuevo Empleado
      </button>
      <button onclick="exportCSV()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-xl text-sm font-semibold transition-all">Exportar CSV</button>
      <button onclick="window.print()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-xl text-sm font-semibold transition-all">Imprimir</button>
    </div>
  </div>
</header>

<div class="bg-white border-b border-indigo-100 no-print">
  <div class="max-w-6xl mx-auto px-4 py-3 grid grid-cols-2 md:grid-cols-4 gap-2 text-center">
    <div><div class="text-2xl font-bold text-indigo-600" id="s-total">0</div><div class="text-xs text-gray-500">Empleados</div></div>
    <div><div class="text-2xl font-bold text-violet-600" id="s-depts">0</div><div class="text-xs text-gray-500">Departamentos</div></div>
    <div><div class="text-2xl font-bold text-pink-500" id="s-bday">0</div><div class="text-xs text-gray-500">Cumplen este mes</div></div>
    <div><div class="text-2xl font-bold text-amber-600" id="s-anni">0</div><div class="text-xs text-gray-500">Aniversarios este mes</div></div>
  </div>
</div>

<div class="max-w-6xl mx-auto px-4 py-6 no-print">
  <div id="alerts-box"></div>
  <div class="flex flex-wrap gap-3 mb-5">
    <div class="relative flex-1 min-w-52">
      <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
      <input id="search" onkeyup="render()" placeholder="Buscar nombre, puesto, departamento..." class="w-full pl-9 pr-4 py-2 border border-indigo-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
    </div>
    <select id="dept-filter" onchange="render()" class="border border-indigo-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
      <option value="">Todos los departamentos</option>
    </select>
  </div>
  <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  <div id="extras-zone"></div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-start justify-center p-4 overflow-y-auto no-print">
  <div class="bg-white rounded-2xl w-full max-w-lg my-4 shadow-2xl" id="detail-body"></div>
</div>

<!-- Form Modal -->
<div id="form-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-start justify-center p-4 overflow-y-auto no-print">
  <div class="bg-white rounded-2xl w-full max-w-lg my-4 shadow-2xl">
    <div class="indigo-grad text-white px-6 py-4 rounded-t-2xl flex items-center justify-between">
      <h2 class="text-lg font-bold" id="form-title">Nuevo Empleado</h2>
      <button onclick="closeForm()" class="text-white/80 hover:text-white text-2xl leading-none">&times;</button>
    </div>
    <div class="p-5 space-y-3 max-h-[82vh] overflow-y-auto">
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2"><label class="text-xs font-semibold text-gray-600 block mb-1">Nombre completo *</label><input id="f-name" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Puesto</label><input id="f-role" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Departamento *</label><input id="f-dept" list="dept-dl" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"><datalist id="dept-dl"></datalist></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Fecha de ingreso</label><input id="f-hire" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Fecha de nacimiento</label><input id="f-bday" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Telefono</label><input id="f-phone" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="55 1234 5678"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Email</label><input id="f-email" type="email" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Contacto emergencia</label><input id="f-ename" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="Nombre y relacion"></div>
        <div><label class="text-xs font-semibold text-gray-600 block mb-1">Tel. emergencia</label><input id="f-ephone" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="55 9876 5432"></div>
        <div class="col-span-2"><label class="text-xs font-semibold text-gray-600 block mb-1">Notas</label><textarea id="f-notes" rows="2" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" placeholder="Habilidades, observaciones..."></textarea></div>
      </div>
      <div class="flex gap-3 pt-1">
        <button onclick="saveEmp()" class="flex-1 indigo-grad text-white py-2.5 rounded-xl font-semibold text-sm hover:opacity-90">Guardar</button>
        <button onclick="closeForm()" class="px-5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<footer class="text-center py-6 text-xs text-indigo-400/60 no-print">Powered by <span class="font-semibold text-indigo-500">Novamente Studio</span></footer>

<script>
const SK = 'novadev_directorio_v1';
let emps = [], editId = null;

const COLORS = ['bg-indigo-500','bg-violet-500','bg-purple-500','bg-blue-500','bg-pink-500','bg-rose-500','bg-teal-500','bg-emerald-500'];
const DEPT_COLORS = {'Administracion':'bg-blue-100 text-blue-700','Ventas':'bg-green-100 text-green-700','Operaciones':'bg-orange-100 text-orange-700','Recursos Humanos':'bg-pink-100 text-pink-700','Tecnologia':'bg-indigo-100 text-indigo-700','Marketing':'bg-purple-100 text-purple-700'};

const DEMO = [
  {id:1,name:'Ana Garcia Lopez',role:'Gerente General',dept:'Administracion',hire:'2020-03-15',bday:'1985-04-15',phone:'55 2345 6789',email:'ana.garcia@empresa.mx',ename:'Carlos Garcia (esposo)',ephone:'55 9876 5432',notes:'Responsable de operaciones generales. Habla ingles avanzado.'},
  {id:2,name:'Luis Martinez Ruiz',role:'Jefe de Ventas',dept:'Ventas',hire:'2021-06-01',bday:'1990-07-22',phone:'55 3456 7890',email:'luis.martinez@empresa.mx',ename:'Maria Ruiz (madre)',ephone:'55 8765 4321',notes:'Mejor vendedor 2023. Zona norte.'},
  {id:3,name:'Sofia Torres Mendez',role:'Contadora',dept:'Administracion',hire:'2019-09-10',bday:'1988-12-05',phone:'55 4567 8901',email:'sofia.torres@empresa.mx',ename:'Pedro Torres (padre)',ephone:'55 7654 3210',notes:'CPA certificada. Experiencia SAT y IMSS.'},
  {id:4,name:'Miguel Hernandez Vega',role:'Vendedor Senior',dept:'Ventas',hire:'2022-01-15',bday:'1995-04-08',phone:'55 5678 9012',email:'miguel.hernandez@empresa.mx',ename:'Laura Vega (esposa)',ephone:'55 6543 2109',notes:'Especialista en cuentas corporativas.'},
  {id:5,name:'Carmen Jimenez Salas',role:'Coordinadora RRHH',dept:'Recursos Humanos',hire:'2020-11-20',bday:'1992-09-14',phone:'55 6789 0123',email:'carmen.jimenez@empresa.mx',ename:'Jose Salas (hermano)',ephone:'55 5432 1098',notes:'Psicologia laboral. Nomina en CONTPAQi.'},
  {id:6,name:'Roberto Flores Cruz',role:'Supervisor de Almacen',dept:'Operaciones',hire:'2018-05-03',bday:'1983-02-28',phone:'55 7890 1234',email:'roberto.flores@empresa.mx',ename:'Elena Cruz (esposa)',ephone:'55 4321 0987',notes:'7 anos en la empresa. Operador de montacargas.'},
  {id:7,name:'Valeria Ramirez Luna',role:'Disenadora Grafica',dept:'Marketing',hire:'2023-02-14',bday:'1998-06-30',phone:'55 8901 2345',email:'valeria.ramirez@empresa.mx',ename:'Diana Luna (madre)',ephone:'55 3210 9876',notes:'Adobe Creative Suite. Redes sociales.'},
  {id:8,name:'Eduardo Sanchez Mora',role:'Desarrollador Web',dept:'Tecnologia',hire:'2022-08-01',bday:'1994-11-17',phone:'55 9012 3456',email:'eduardo.sanchez@empresa.mx',ename:'Patricia Mora (mama)',ephone:'55 2109 8765',notes:'Full stack Laravel y React.'},
  {id:9,name:'Isabel Morales Rios',role:'Ejecutiva de Ventas',dept:'Ventas',hire:'2023-05-15',bday:'1997-08-03',phone:'55 0123 4567',email:'isabel.morales@empresa.mx',ename:'Antonio Rios (padre)',ephone:'55 1098 7654',notes:'Region sur. Alta en mayo 2023.'},
  {id:10,name:'Carlos Gutierrez Paz',role:'Operador de Produccion',dept:'Operaciones',hire:'2017-10-08',bday:'1980-01-20',phone:'55 1234 5670',email:'carlos.gutierrez@empresa.mx',ename:'Rosa Paz (esposa)',ephone:'55 0987 6543',notes:'8 anos en empresa. Turno matutino.'},
  {id:11,name:'Patricia Avila Reyes',role:'Asistente Administrativa',dept:'Administracion',hire:'2021-03-22',bday:'1993-04-25',phone:'55 2345 6701',email:'patricia.avila@empresa.mx',ename:'Jorge Reyes (esposo)',ephone:'55 9876 5430',notes:'Atencion a clientes VIP. Bilingue ingles-espanol.'},
  {id:12,name:'Fernando Lopez Soto',role:'Analista de Marketing',dept:'Marketing',hire:'2022-11-07',bday:'1996-03-12',phone:'55 3456 7012',email:'fernando.lopez@empresa.mx',ename:'Lucia Soto (mama)',ephone:'55 8765 4302',notes:'Google Ads y Meta Ads certificado.'}
];

function load() {
  const s = localStorage.getItem(SK);
  emps = s ? JSON.parse(s) : DEMO;
  if (!s) saveData();
}
function saveData() { localStorage.setItem(SK, JSON.stringify(emps)); }
function initials(name) { return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function avColor(id) { return COLORS[id % COLORS.length]; }
function daysUntilBd(bd) {
  if (!bd) return 999;
  const t = new Date(), b = new Date(bd);
  const n = new Date(t.getFullYear(), b.getMonth(), b.getDate());
  if (n < t) n.setFullYear(t.getFullYear()+1);
  return Math.ceil((n-t)/86400000);
}
function yearsAt(hire) { if (!hire) return 0; return new Date().getFullYear() - new Date(hire).getFullYear(); }
function fmtDate(ds) {
  if (!ds) return 'No registrado';
  return new Date(ds+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
}

function updateStats() {
  const m = new Date().getMonth();
  document.getElementById('s-total').textContent = emps.length;
  document.getElementById('s-depts').textContent = new Set(emps.map(e=>e.dept)).size;
  document.getElementById('s-bday').textContent = emps.filter(e=>e.bday&&new Date(e.bday).getMonth()===m).length;
  document.getElementById('s-anni').textContent = emps.filter(e=>e.hire&&new Date(e.hire).getMonth()===m).length;
}

function buildAlerts() {
  const today = new Date(), alerts = [];
  emps.forEach(e => {
    const d = daysUntilBd(e.bday);
    if (d <= 7) alerts.push({name:e.name, label:'Cumpleanos', days:d, phone:e.phone, msg:`Hola ${e.name.split(' ')[0]}! El equipo te desea un feliz cumpleanos!`});
    if (e.hire) {
      const h = new Date(e.hire), a = new Date(today.getFullYear(),h.getMonth(),h.getDate());
      const da = Math.ceil((a-today)/86400000), yrs = yearsAt(e.hire);
      if (da>=0&&da<=7&&yrs>0) alerts.push({name:e.name, label:`Aniversario ${yrs} anos`, days:da, phone:e.phone, msg:`Hola ${e.name.split(' ')[0]}! Felicidades por tus ${yrs} anos con nosotros!`});
    }
  });
  const box = document.getElementById('alerts-box');
  if (!alerts.length) { box.innerHTML=''; return; }
  box.innerHTML = `<div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-5">
    <p class="text-sm font-bold text-amber-800 mb-3">Alertas proximas (7 dias)</p>
    <div class="space-y-2">${alerts.map(a=>{
      const wa=`https://wa.me/52${(a.phone||'5512345678').replace(/\D/g,'')}?text=${encodeURIComponent(a.msg)}`;
      return `<div class="flex items-center justify-between bg-white rounded-xl px-3 py-2 text-sm">
        <div><span class="font-semibold text-gray-800">${a.name}</span><span class="text-gray-500 text-xs ml-2">${a.label} — ${a.days===0?'HOY':'en '+a.days+'d'}</span></div>
        <a href="${wa}" target="_blank" class="bg-green-500 hover:bg-green-600 text-white text-xs px-3 py-1.5 rounded-lg font-semibold">WhatsApp</a>
      </div>`;
    }).join('')}</div></div>`;
}

function refreshDeptFilter() {
  const sel = document.getElementById('dept-filter'), cur = sel.value;
  const depts = [...new Set(emps.map(e=>e.dept))].sort();
  sel.innerHTML = '<option value="">Todos los departamentos</option>' + depts.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');
  const dl = document.getElementById('dept-dl');
  if (dl) { dl.innerHTML=''; depts.forEach(d=>{const o=document.createElement('option');o.value=d;dl.appendChild(o);}); }
}

function render() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const dept = document.getElementById('dept-filter')?.value||'';
  const list = emps.filter(e=>(!dept||e.dept===dept)&&(!q||e.name.toLowerCase().includes(q)||(e.role||'').toLowerCase().includes(q)||e.dept.toLowerCase().includes(q)));
  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML='<div class="col-span-4 text-center py-12 text-gray-400 text-sm">Sin resultados</div>'; return; }
  g.innerHTML = list.map(e=>{
    const d=daysUntilBd(e.bday), dc=DEPT_COLORS[e.dept]||'bg-gray-100 text-gray-700', yrs=yearsAt(e.hire);
    const bdBadge = d<=7 ? `<span class="ml-1 bg-pink-100 text-pink-600 text-xs px-1.5 py-0.5 rounded-full">${d===0?'Hoy':d+'d'}</span>`:'';
    return `<div class="bg-white rounded-2xl shadow-sm border border-indigo-100 card-hover cursor-pointer print-card" onclick="openDetail(${e.id})">
      <div class="p-4 flex items-start gap-3">
        <div class="avatar ${avColor(e.id)} text-white">${initials(e.name)}</div>
        <div class="flex-1 min-w-0">
          <div class="font-bold text-gray-800 text-sm leading-tight">${e.name}${bdBadge}</div>
          <div class="text-indigo-600 text-xs font-medium mt-0.5 truncate">${e.role||''}</div>
          <span class="dept-badge mt-1.5 ${dc}">${e.dept}</span>
        </div>
      </div>
      <div class="px-4 pb-3 border-t border-gray-50 pt-2 space-y-1">
        <div class="text-xs text-gray-500">${e.phone||'Sin telefono'}</div>
        ${yrs>0?`<div class="text-xs text-indigo-600 font-medium">${yrs} ano${yrs>1?'s':''} en empresa</div>`:''}
      </div>
      <div class="flex border-t border-gray-50 no-print">
        <button onclick="event.stopPropagation();openDetail(${e.id})" class="flex-1 text-xs text-indigo-600 py-2 hover:bg-indigo-50 font-medium transition-all">Ver perfil</button>
        ${e.phone?`<a href="https://wa.me/52${e.phone.replace(/\D/g,'')}" target="_blank" onclick="event.stopPropagation()" class="flex-1 text-xs text-green-600 py-2 hover:bg-green-50 font-medium transition-all text-center border-l border-gray-50">WhatsApp</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function openDetail(id) {
  const e = emps.find(x=>x.id===id); if (!e) return;
  const d=daysUntilBd(e.bday), yrs=yearsAt(e.hire), dc=DEPT_COLORS[e.dept]||'bg-gray-100 text-gray-700';
  const bdMsg=`Hola ${e.name.split(' ')[0]}! El equipo te desea un muy feliz cumpleanos!`;
  const wa=`https://wa.me/52${(e.phone||'5512345678').replace(/\D/g,'')}?text=${encodeURIComponent(bdMsg)}`;
  document.getElementById('detail-body').innerHTML = `
    <div class="indigo-grad text-white px-6 py-5 rounded-t-2xl flex items-start justify-between">
      <div class="flex items-center gap-4">
        <div class="big-av bg-white/20 text-white">${initials(e.name)}</div>
        <div><h2 class="text-xl font-bold">${e.name}</h2><p class="text-indigo-100 text-sm">${e.role||''}</p><span class="dept-badge bg-white/20 text-white mt-1">${e.dept}</span></div>
      </div>
      <button onclick="document.getElementById('detail-modal').classList.add('hidden')" class="text-white/80 hover:text-white text-2xl leading-none">&times;</button>
    </div>
    <div class="p-5 space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-indigo-50 rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">Fecha de ingreso</div><div class="font-semibold text-sm">${fmtDate(e.hire)}</div>${yrs>0?`<div class="text-xs text-indigo-600 font-medium">${yrs} ano${yrs>1?'s':''} en empresa</div>`:''}</div>
        <div class="bg-pink-50 rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">Cumpleanos</div><div class="font-semibold text-sm">${fmtDate(e.bday)}</div>${d<=30&&d>=0?`<div class="text-xs text-pink-600 font-medium">${d===0?'HOY!':'En '+d+' dias'}</div>`:''}</div>
      </div>
      <div class="space-y-2">
        <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <div class="flex-1"><div class="text-xs text-gray-500">Telefono directo</div><div class="font-semibold text-sm">${e.phone||'No registrado'}</div></div>
          ${e.phone?`<a href="https://wa.me/52${e.phone.replace(/\D/g,'')}" target="_blank" class="bg-green-500 text-white text-xs px-3 py-1.5 rounded-lg font-medium hover:bg-green-600 shrink-0">WhatsApp</a>`:''}
        </div>
        <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <div><div class="text-xs text-gray-500">Correo electronico</div><div class="font-semibold text-sm">${e.email||'No registrado'}</div></div>
        </div>
        ${e.ename?`<div class="flex items-center gap-3 p-3 bg-red-50 rounded-xl">
          <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          <div class="flex-1"><div class="text-xs text-red-600 font-bold">Contacto de emergencia</div><div class="font-semibold text-sm">${e.ename}</div><div class="text-xs text-gray-500">${e.ephone||''}</div></div>
          ${e.ephone?`<a href="https://wa.me/52${e.ephone.replace(/\D/g,'')}" target="_blank" class="bg-red-500 text-white text-xs px-3 py-1.5 rounded-lg font-medium hover:bg-red-600 shrink-0">Llamar</a>`:''}
        </div>`:''}
        ${e.notes?`<div class="p-3 bg-yellow-50 border border-yellow-200 rounded-xl"><div class="text-xs font-bold text-yellow-800 mb-1">Notas</div><p class="text-sm text-yellow-700">${e.notes}</p></div>`:''}
      </div>
      ${d<=14&&e.phone?`<div class="bg-pink-50 border border-pink-200 rounded-xl p-3 flex items-center justify-between gap-3">
        <div><div class="font-semibold text-pink-800 text-sm">Cumpleanos ${d===0?'HOY!':'en '+d+' dia'+(d>1?'s':'')}</div><div class="text-xs text-pink-600">Felicitar por WhatsApp</div></div>
        <a href="${wa}" target="_blank" class="bg-pink-500 hover:bg-pink-600 text-white text-sm px-4 py-2 rounded-xl font-semibold shrink-0">Felicitar</a>
      </div>`:''}
      <div class="flex gap-2">
        <button onclick="document.getElementById('detail-modal').classList.add('hidden');openForm(${id})" class="flex-1 border border-indigo-200 text-indigo-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-50">Editar</button>
        <button onclick="delEmp(${id})" class="px-5 border border-red-200 text-red-500 py-2.5 rounded-xl text-sm font-semibold hover:bg-red-50">Eliminar</button>
      </div>
    </div>`;
  document.getElementById('detail-modal').classList.remove('hidden');
}

function openForm(id) {
  editId = id;
  document.getElementById('form-title').textContent = id ? 'Editar Empleado' : 'Nuevo Empleado';
  const flds = ['name','role','dept','hire','bday','phone','email','ename','ephone','notes'];
  if (id) {
    const e = emps.find(x=>x.id===id); if (!e) return;
    const map = {name:e.name,role:e.role||'',dept:e.dept||'',hire:e.hire||'',bday:e.bday||'',phone:e.phone||'',email:e.email||'',ename:e.ename||'',ephone:e.ephone||'',notes:e.notes||''};
    flds.forEach(f=>{ const el=document.getElementById('f-'+f); if(el) el.value=map[f]; });
  } else {
    flds.forEach(f=>{ const el=document.getElementById('f-'+f); if(el) el.value=''; });
  }
  document.getElementById('form-modal').classList.remove('hidden');
}
function closeForm() { document.getElementById('form-modal').classList.add('hidden'); }

function saveEmp() {
  const name=document.getElementById('f-name').value.trim(), dept=document.getElementById('f-dept').value.trim();
  if (!name||!dept) { alert('Nombre y departamento son requeridos'); return; }
  const emp = {id:editId||Date.now(),name,dept,role:document.getElementById('f-role').value.trim(),hire:document.getElementById('f-hire').value,bday:document.getElementById('f-bday').value,phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),ename:document.getElementById('f-ename').value.trim(),ephone:document.getElementById('f-ephone').value.trim(),notes:document.getElementById('f-notes').value.trim()};
  if (editId) { const i=emps.findIndex(e=>e.id===editId); if(i>=0) emps[i]=emp; } else emps.push(emp);
  saveData(); closeForm(); refreshDeptFilter(); render(); updateStats(); buildAlerts();
}

function delEmp(id) {
  if (!confirm('Eliminar este empleado?')) return;
  emps = emps.filter(e=>e.id!==id);
  saveData(); document.getElementById('detail-modal').classList.add('hidden'); refreshDeptFilter(); render(); updateStats(); buildAlerts();
}

// ===================== BIRTHDAY CALENDAR =====================
function buildBirthdayCalendar() {
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const byMonth = {};
  months.forEach((m,i) => { byMonth[i] = []; });
  emps.forEach(e => {
    if (e.bday) { const d = new Date(e.bday); byMonth[d.getMonth()].push({name:e.name, day:d.getDate(), phone:e.phone}); }
  });
  const thisMonth = new Date().getMonth();
  return `<div class="bg-white rounded-2xl shadow-sm border border-indigo-100 p-5 mt-6 no-print">
    <h3 class="font-bold text-gray-800 mb-4 text-sm">Calendario de Cumpleanos del Equipo</h3>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
      ${months.map((m,i) => `<div class="rounded-xl p-3 ${i===thisMonth?'bg-pink-50 border-2 border-pink-300':'bg-gray-50'}">
        <div class="font-bold text-xs ${i===thisMonth?'text-pink-700':'text-gray-600'} mb-2">${m}${i===thisMonth?' (este mes)':''}</div>
        ${byMonth[i].length ? byMonth[i].sort((a,b)=>a.day-b.day).map(e=>{
          const msg=`Hola ${e.name.split(' ')[0]}! Todo el equipo te desea un muy feliz cumpleanos en este mes de ${m}!`;
          const wa=`https://wa.me/52${(e.phone||'5512345678').replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
          return `<div class="flex items-center justify-between py-0.5"><span class="text-xs text-gray-700"><span class="font-bold">${e.day}</span> — ${e.name.split(' ')[0]}</span>${e.phone?`<a href="${wa}" target="_blank" class="text-green-500 text-xs hover:text-green-700">WA</a>`:''}</div>`;
        }).join('') : '<div class="text-xs text-gray-300">Sin cumpleanos</div>'}
      </div>`).join('')}
    </div>
  </div>`;
}

// ===================== DEPARTMENT SUMMARY =====================
function buildDeptSummary() {
  const depts = [...new Set(emps.map(e=>e.dept))].sort();
  if (!depts.length) return '';
  const dc = DEPT_COLORS;
  return `<div class="bg-white rounded-2xl shadow-sm border border-indigo-100 p-5 mt-6 no-print">
    <h3 class="font-bold text-gray-800 mb-4 text-sm">Resumen por Departamento</h3>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
      ${depts.map(d => {
        const count = emps.filter(e=>e.dept===d).length;
        const cc = dc[d]||'bg-gray-100 text-gray-700';
        return `<div class="rounded-xl p-3 text-center cursor-pointer hover:opacity-80 transition-all ${cc}" onclick="document.getElementById('dept-filter').value='${d}';render()">
          <div class="text-2xl font-black">${count}</div>
          <div class="text-xs font-semibold mt-1">${d}</div>
        </div>`;
      }).join('')}
      <div class="rounded-xl p-3 text-center bg-indigo-100 text-indigo-700 cursor-pointer hover:opacity-80 transition-all" onclick="document.getElementById('dept-filter').value='';render()">
        <div class="text-2xl font-black">${emps.length}</div>
        <div class="text-xs font-semibold mt-1">Total</div>
      </div>
    </div>
  </div>`;
}

// ===================== ANNIVERSARY LIST =====================
function buildAnniversaries() {
  const upcoming = emps.filter(e => {
    if (!e.hire) return false;
    const h = new Date(e.hire);
    const today = new Date();
    const anni = new Date(today.getFullYear(), h.getMonth(), h.getDate());
    const days = Math.ceil((anni - today) / 86400000);
    return days >= 0 && days <= 30;
  }).map(e => {
    const h = new Date(e.hire);
    const today = new Date();
    const anni = new Date(today.getFullYear(), h.getMonth(), h.getDate());
    const days = Math.ceil((anni - today) / 86400000);
    const yrs = today.getFullYear() - h.getFullYear();
    const msg = `Hola ${e.name.split(' ')[0]}! Felicidades por tus ${yrs} anos con nosotros! Gracias por tu dedicacion.`;
    const wa = `https://wa.me/52${(e.phone||'5512345678').replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
    return {name:e.name, days, yrs, wa, phone:e.phone};
  }).sort((a,b)=>a.days-b.days);

  if (!upcoming.length) return '';
  return `<div class="bg-indigo-50 border border-indigo-200 rounded-2xl p-4 mt-6 no-print">
    <h3 class="font-bold text-indigo-800 mb-3 text-sm">Aniversarios proximos (30 dias)</h3>
    <div class="space-y-2">
      ${upcoming.map(a=>`<div class="flex items-center justify-between bg-white rounded-xl px-3 py-2 text-sm">
        <div><span class="font-semibold text-gray-800">${a.name}</span><span class="text-gray-500 text-xs ml-2">${a.yrs} aniversario — ${a.days===0?'HOY':'en '+a.days+' dias'}</span></div>
        ${a.phone?`<a href="${a.wa}" target="_blank" class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg font-semibold">Felicitar</a>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

// ===================== EXPORT CSV =====================
function exportCSV() {
  const header = 'Nombre,Puesto,Departamento,Ingreso,Cumpleanos,Telefono,Email,Contacto Emergencia';
  const rows = emps.map(e => `"${e.name}","${e.role||''}","${e.dept}","${e.hire||''}","${e.bday||''}","${e.phone||''}","${e.email||''}","${e.ename||''} ${e.ephone||''}"`);
  const csv = header + '\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'directorio-empleados.csv';
  a.click();
}

// ===================== AUGMENT RENDER WITH EXTRAS =====================
const _origRender = render;
function renderAll() {
  _origRender();
  const extras = document.getElementById('extras-zone');
  if (extras) {
    extras.innerHTML = buildDeptSummary() + buildAnniversaries() + buildBirthdayCalendar();
  }
}

document.getElementById('detail-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.add('hidden');});
document.getElementById('form-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeForm();});

// Override render to also update extras
const __r = render;
function render() {
  __r.call(this,...arguments);
  setTimeout(()=>{
    const extras = document.getElementById('extras-zone');
    if (extras) extras.innerHTML = buildDeptSummary() + buildAnniversaries() + buildBirthdayCalendar();
  },0);
}

load(); refreshDeptFilter(); render(); updateStats(); buildAlerts();
</script>
